# post-deploy-qa.conf — per-project @post-deploy-tagged test commands run by
# /usr/local/bin/post-deploy-qa-hook.sh immediately after auto-deploy regen.
#
# Format (TAB-separated):
#   <project>\t<cmd_template>\t<timeout_sec>\t[--freeze-on-fail]
#
# The template may contain {LIVE_URL}; the hook substitutes it at runtime.
# A missing column 4 means notify-only on failure (no auto-deploy freeze).
#
# Adoption is opt-in: projects tag fast smoke tests with @post-deploy in their
# spec, then add a row here (uncommented) when they are ready to gate regen
# on that smoke. See SKILLS/post-deploy-qa.md for the adoption checklist.
#
# Examples (keep commented until a project actually adopts):
# abs-dashboard	cd /opt/abs-dashboard && npx playwright test --config=tests/playwright.config.js --grep=@post-deploy	180
# car-offers	cd /opt/car-offers && npx playwright test tests/car-offers.spec.ts --grep=@post-deploy	180	--freeze-on-fail
# gym-intelligence	cd /opt/gym-intelligence && npx playwright test tests/gym-intelligence.spec.ts --grep=@post-deploy	120
