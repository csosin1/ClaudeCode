# post-deploy-qa.conf — per-project @post-deploy-tagged test commands run by
# /usr/local/bin/post-deploy-qa-hook.sh immediately after auto-deploy regen.
#
# Format (TAB-separated):
#   <project>\t<cmd_template>\t<timeout_sec>\t[--freeze-on-fail]
#
# The template may contain {LIVE_URL}; the hook substitutes it at runtime.
# A missing column 4 means notify-only on failure (no auto-deploy freeze).
#
# Adoption is opt-in: projects tag fast smoke tests with @post-deploy in their
# spec, then add a row here (uncommented) when they are ready to gate regen
# on that smoke. See SKILLS/post-deploy-qa.md for the adoption checklist.
#
# This file is mirrored to /etc/post-deploy-qa.conf by auto_deploy_general.sh
# on every deploy; edit here (version-controlled), not in /etc. Frozen reference
# copy at helpers/post-deploy-qa.conf.template shows the shape.

# --- ACTIVE ROWS ------------------------------------------------------------
# abs-dashboard — six @post-deploy-tagged tests in tests/abs-dashboard.spec.ts
# (entity-decoding, placeholder guards, chart-category assertions). Freeze on
# fail: the 2026-04-17 Hazard-by-LTV incident is exactly what this gates.
abs-dashboard	cd /opt/abs-dashboard && BASE_URL={LIVE_URL} npx playwright test tests/abs-dashboard.spec.ts --grep=@post-deploy --project=mobile	180	--freeze-on-fail

