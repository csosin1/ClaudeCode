server {
    server_name casinv.dev 159.223.127.125;

    # Landing page — live at /, preview at /preview/, diagnostic JSON files at root
    location = /preview { return 301 /preview/; }
    location /preview/ {
        alias /var/www/landing/preview/;
        index index.html;
    }
    location / {
        root /var/www/landing;
        try_files /live$uri /live$uri/index.html $uri =404;
    }

    # Advisor docs — path-secret gated read-only view of /opt/site-deploy/ curated files.
    # Switched from basic-auth to path-secret 2026-04-17: Claude's web-fetch tool
    # strips embedded credentials from URLs (classic RFC 3986 security hardening),
    # so https://user:pass@host/ fails. Path-secret works with any fetcher since the
    # secret IS the URL — no headers, no basic-auth challenge.
    # Rotate by regenerating DOCS_TOKEN + reloading nginx with the new path.
    location /docs/0f296d8365108fac78079a6940a53251b04e55dd3b2ce4a3/ {
        alias /var/www/docs-store/;
        index index.html;
        autoindex off;
        location ~* \.(md|html|json|txt)$ { }
        location ~ /\. { deny all; }
    }
    # Anything else under /docs/ 404s (including the old basic-auth path), keeps
    # leaked URLs from working if the token rotates.
    location /docs/ { return 404; }
    location = /docs { return 404; }

    # Carvana ABS Dashboard — preview (must come before live for longest-prefix match)
    location = /CarvanaLoanDashBoard { return 301 /CarvanaLoanDashBoard/; }
    location = /CarvanaLoanDashBoard/preview { return 301 /CarvanaLoanDashBoard/preview/; }
    location /CarvanaLoanDashBoard/preview/ {
        alias /opt/abs-dashboard/carvana_abs/static_site/preview/;
        index index.html;
        try_files $uri $uri/ /CarvanaLoanDashBoard/preview/index.html;
    }
    location /CarvanaLoanDashBoard/ {
        alias /opt/abs-dashboard/carvana_abs/static_site/live/;
        index index.html;
        try_files $uri $uri/ /CarvanaLoanDashBoard/index.html;
    }

    # Carvana hub — preview + live
    location = /carvana { return 301 /carvana/; }
    location = /carvana/preview { return 301 /carvana/preview/; }
    location /carvana/preview/ {
        alias /var/www/carvana/preview/;
        index index.html;
    }
    location /carvana/ {
        alias /var/www/carvana/live/;
        index index.html;
    }

    # Car Offers — preview (port 3101) + live (port 3100)
    location = /car-offers { return 301 /car-offers/; }
    location = /car-offers/preview { return 301 /car-offers/preview/; }
    location /car-offers/preview/ {
        proxy_pass http://127.0.0.1:3101/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 180s;
    }
    location /car-offers/ {
        proxy_pass http://127.0.0.1:3100/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 180s;
    }

    # Gym Intelligence — preview (port 8503, prefix /gym-intelligence/preview) + live (port 8502)
    location = /gym-intelligence { return 301 /gym-intelligence/; }
    location = /gym-intelligence/preview { return 301 /gym-intelligence/preview/; }
    location /gym-intelligence/preview/ {
        proxy_pass http://127.0.0.1:8503/gym-intelligence/preview/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
    location /gym-intelligence/ {
        proxy_pass http://127.0.0.1:8502/gym-intelligence/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Games — preview + live
    location = /games/preview { return 301 /games/preview/; }
    location /games/preview/ {
        alias /var/www/games/preview/;
        index index.html;
    }
    location /games/ {
        alias /var/www/games/live/;
        index index.html;
    }

    # Timeshare Surveillance — static dashboard + admin (Flask on 8510 live / 8511 preview)
    location = /timeshare-surveillance { return 301 /timeshare-surveillance/; }
    location = /timeshare-surveillance/preview { return 301 /timeshare-surveillance/preview/; }

    # MIGRATED to prod droplet 2026-04-17 — all /timeshare-surveillance/ paths
    # now served by 10.116.0.3 (casinv-prod) via private VPC. Dev's nginx is
    # now a thin reverse-proxy; dev's local copy of files is frozen/decommissioned.
    # Rollback: revert this commit + systemctl start timeshare-surveillance-* on dev.
    location /timeshare-surveillance/ {
        proxy_pass http://10.116.0.3/timeshare-surveillance/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Webhook deploy endpoint
    location = /webhook/deploy {
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
        limit_except POST { deny all; }
    }
    location = /webhook/health {
        proxy_pass http://127.0.0.1:9000/health;
    }

    # Security: block dotfiles, .env, .md (404 rather than 403 — hides existence)
    location ~ /\. { return 404; }
    location ~* \.md$ { return 404; }
    location ~* \.env$ { return 404; }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/casinv.dev/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/casinv.dev/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

# Web terminal (ttyd) on code.casinv.dev
server {
    server_name code.casinv.dev;

    location / {
        proxy_pass http://127.0.0.1:7681;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/casinv.dev/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/casinv.dev/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
