# paid-call per-vendor hard caps.
# Installed to /etc/paid-call-caps.conf; this file is the version-controlled mirror.
#
# Format: <vendor> <period> <cap_usd>
# Periods: daily | session | monthly
#
# If a vendor is not listed, paid-call assumes no cap (logs but does not refuse).
# When a call would push cumulative spend over cap, paid-call refuses with exit 127.

decodo daily 2.00
capsolver daily 5.00
anthropic daily 20.00
# openai daily 5.00     # not yet in use
# twilio daily 2.00     # not yet in use
# aws-ses daily 1.00    # not yet in use
