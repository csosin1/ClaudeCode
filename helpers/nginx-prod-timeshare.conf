server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Only accept from VPC private range + localhost.
    allow 10.116.0.0/20;
    allow 127.0.0.1;
    deny all;

    # Preview admin (Flask) — rewrite to strip the project prefix
    location /timeshare-surveillance/preview/admin/ {
        rewrite ^/timeshare-surveillance/preview/admin/(.*)$ /admin/$1 break;
        proxy_pass http://127.0.0.1:8511;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Preview static dashboard
    location /timeshare-surveillance/preview/ {
        alias /opt/timeshare-surveillance-preview/dashboard/;
        index index.html;
    }
    # Live admin (Flask)
    location /timeshare-surveillance/admin/ {
        rewrite ^/timeshare-surveillance/admin/(.*)$ /admin/$1 break;
        proxy_pass http://127.0.0.1:8510;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Live static dashboard
    location /timeshare-surveillance/ {
        alias /opt/timeshare-surveillance-live/dashboard/;
        index index.html;
    }
}
