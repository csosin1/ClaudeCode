# deploy-to-prod.conf — after auto-deploy writes local files, mirror them to prod.
# Format (tab or whitespace separated):
#   <local-path>  <remote-host>:<remote-path>  [post-sync-command-on-remote]
#
# Lines starting with # are comments. Empty lines ignored.
#
# Rsync excludes applied to every sync: __pycache__, *.pyc, venv/, .env, data/
# (project data is authoritative on prod; dev's copy may be stale/read-only-backup)
#
# Post-sync command (optional): ssh'd to the remote to restart systemd services, etc.
# Use `systemctl try-restart` (no-op if unit is inactive) to avoid waking dev services
# that we've disabled post-migration.

# Phase 1 — timeshare-surveillance (both instances, since both migrated 2026-04-17)
/opt/timeshare-surveillance-preview  prod-private:/opt/timeshare-surveillance-preview  systemctl try-restart timeshare-surveillance-watcher-preview timeshare-surveillance-admin-preview
/opt/timeshare-surveillance-live     prod-private:/opt/timeshare-surveillance-live     systemctl try-restart timeshare-surveillance-watcher timeshare-surveillance-admin

# Option C (2026-04-17) — general-deploy.timer disabled on prod. Dev stays the
# authoritative source for all migrated project code; this file drives the
# dev→prod code mirror. Entries below replace what general-deploy.timer was
# doing on prod every 5 min.

# Phase 2 — gym-intelligence (both instances)
/opt/gym-intelligence          prod-private:/opt/gym-intelligence          systemctl try-restart gym-intelligence
/opt/gym-intelligence-preview  prod-private:/opt/gym-intelligence-preview  systemctl try-restart gym-intelligence-preview

# Phase 4 — car-offers (both instances)
/opt/car-offers          prod-private:/opt/car-offers          systemctl try-restart car-offers
/opt/car-offers-preview  prod-private:/opt/car-offers-preview  systemctl try-restart car-offers-preview

# Phase 3 — carvana-abs (abs-dashboard): INTENTIONALLY DISABLED.
# abs-dashboard's state includes ~34 GB of SQLite DBs mutated by the ML retrain
# pipeline on prod. Rsyncing from dev would clobber that live state with stale
# dev copies. Instead, abs-dashboard uses its own project-specific
# `auto-deploy.timer` ON PROD, which pulls from git directly. Do NOT enable
# the line below without first redesigning how abs-dashboard state flows.
# /opt/abs-dashboard  prod-private:/opt/abs-dashboard  systemctl try-restart auto-deploy
