<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dice Roller</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    h1 {
      font-size: 1.75rem;
      margin-bottom: 1.5rem;
    }
    #roll-btn {
      background: #60a5fa;
      color: #0f172a;
      border: none;
      border-radius: 0.5rem;
      padding: 0.75rem 2rem;
      font-size: 1.125rem;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #roll-btn:active {
      opacity: 0.8;
    }
    .die-face {
      margin-top: 1.5rem;
      font-size: 5rem;
      line-height: 1;
      min-height: 5rem;
    }
    #result {
      margin-top: 0.5rem;
      font-size: 2rem;
      font-weight: 700;
      min-height: 2.5rem;
    }
    .history-label {
      margin-top: 2rem;
      font-size: 1rem;
      color: #94a3b8;
      margin-bottom: 0.5rem;
    }
    #history {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      max-width: 300px;
    }
    .history-item {
      background: #1e293b;
      border-radius: 0.375rem;
      padding: 0.375rem 0.75rem;
      font-size: 1.25rem;
    }
  </style>
</head>
<body>
  <h1>Dice Roller</h1>
  <button id="roll-btn">Roll</button>
  <div class="die-face" id="die-face"></div>
  <div id="result"></div>
  <div class="history-label" id="history-label" style="display:none;">Roll History</div>
  <div id="history"></div>
  <script>
    var diceFaces = ['\u2680', '\u2681', '\u2682', '\u2683', '\u2684', '\u2685'];
    var rolls = [];

    document.getElementById('roll-btn').addEventListener('click', function() {
      var value = Math.floor(Math.random() * 6) + 1;
      document.getElementById('die-face').textContent = diceFaces[value - 1];
      document.getElementById('result').textContent = value;

      rolls.unshift(value);
      if (rolls.length > 10) rolls.pop();

      document.getElementById('history-label').style.display = '';
      var historyEl = document.getElementById('history');
      historyEl.innerHTML = '';
      for (var i = 0; i < rolls.length; i++) {
        var item = document.createElement('span');
        item.className = 'history-item';
        item.textContent = diceFaces[rolls[i] - 1] + ' ' + rolls[i];
        historyEl.appendChild(item);
      }
    });
  </script>
</body>
</html>
