<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go Yankees!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1c2841;
    font-family: 'Georgia', serif;
    overflow: hidden;
  }
  h1 {
    font-size: clamp(3rem, 10vw, 6rem);
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    text-shadow: 0 0 20px rgba(255,255,255,0.3);
    margin-bottom: 2rem;
  }
  .logo-container {
    width: clamp(200px, 50vw, 350px);
    height: clamp(200px, 50vw, 350px);
    animation: spin 4s linear infinite;
  }
  .logo-container img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 0 30px rgba(255,255,255,0.25));
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .pinstripe {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent,
      transparent 18px,
      rgba(255,255,255,0.03) 18px,
      rgba(255,255,255,0.03) 20px
    );
    pointer-events: none;
    z-index: 0;
  }
  h1, .logo-container { position: relative; z-index: 1; }
</style>
</head>
<body>
  <div class="pinstripe"></div>
  <h1>Go Yankees!</h1>
  <div class="logo-container">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="95" fill="#1c2841" stroke="#fff" stroke-width="4"/>
      <!-- N -->
      <path d="M60 145 L60 62 L67 62 L100 125 L100 62 L108 62 L108 145 L101 145 L68 82 L68 145 Z" fill="#fff"/>
      <!-- Y overlapping -->
      <path d="M88 62 L110 105 L132 62 L141 62 L114 114 L114 145 L106 145 L106 114 L79 62 Z" fill="#fff"/>
      <!-- Hat brim arc -->
      <path d="M45 58 Q100 38 155 58" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </div>
</body>
</html>
