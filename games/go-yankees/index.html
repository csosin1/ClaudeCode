<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go Yankees!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1c2841;
    font-family: 'Georgia', serif;
    overflow: hidden;
  }
  h1 {
    font-size: clamp(3rem, 10vw, 6rem);
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    text-shadow: 0 0 20px rgba(255,255,255,0.3);
    margin-bottom: 2rem;
  }
  .logo-container {
    width: clamp(200px, 50vw, 350px);
    height: clamp(200px, 50vw, 350px);
    animation: spin 4s linear infinite;
  }
  .logo-container img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 0 30px rgba(255,255,255,0.25));
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .pinstripe {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent,
      transparent 18px,
      rgba(255,255,255,0.03) 18px,
      rgba(255,255,255,0.03) 20px
    );
    pointer-events: none;
    z-index: 0;
  }
  h1, .logo-container { position: relative; z-index: 1; }
</style>
</head>
<body>
  <div class="pinstripe"></div>
  <h1>Go Yankees!</h1>
  <div class="logo-container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/New_York_Yankees_Primary_Logo.svg/800px-New_York_Yankees_Primary_Logo.svg.png" alt="New York Yankees Logo">
  </div>
</body>
</html>
