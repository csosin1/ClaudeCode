<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    h1 {
      font-size: 1.75rem;
      margin-bottom: 2rem;
    }
    #generate-btn {
      background: #60a5fa;
      color: #0f172a;
      border: none;
      border-radius: 0.5rem;
      padding: 0.75rem 2rem;
      font-size: 1.125rem;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #generate-btn:active {
      opacity: 0.8;
    }
    #result {
      margin-top: 2rem;
      font-size: 4rem;
      font-weight: 700;
      min-height: 5rem;
    }
  </style>
</head>
<body>
  <h1>Button Test</h1>
  <button id="generate-btn">Generate Number</button>
  <div id="result"></div>
  <script>
    document.getElementById('generate-btn').addEventListener('click', function() {
      document.getElementById('result').textContent = Math.floor(Math.random() * 100) + 1;
    });
  </script>
</body>
</html>
