<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello World</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: #fff;
    text-align: center;
    padding: 1rem;
  }
  .container {
    max-width: 400px;
    width: 100%;
  }
  h1 {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
  }
  p {
    font-size: 1.1rem;
    opacity: 0.7;
    margin-bottom: 1.5rem;
  }
  .status {
    display: inline-block;
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 0.75rem 1.5rem;
    font-size: 0.9rem;
  }
  .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: #4ade80;
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Hello World</h1>
  <p>Deploy pipeline test</p>
  <div class="status"><span class="dot"></span>Live</div>
</div>
</body>
</html>
