<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Migration Status</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         margin: 0; padding: 1rem; max-width: 900px; margin: 0 auto;
         background: #0d1117; color: #e6edf3; }
  h1 { font-size: 1.3rem; margin: 0 0 .25rem; }
  .sub { color: #8b949e; font-size: .85rem; margin-bottom: 1rem; }
  table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  th, td { text-align: left; padding: .5rem .4rem; border-bottom: 1px solid #30363d;
           vertical-align: top; }
  th { color: #8b949e; font-weight: 600; font-size: .75rem; text-transform: uppercase; }
  tr:last-child td { border-bottom: none; }
  .status { font-weight: 600; white-space: nowrap; }
  .status.in_progress { color: #d29922; }
  .status.complete    { color: #3fb950; }
  .status.failed      { color: #f85149; }
  .ts { color: #8b949e; font-variant-numeric: tabular-nums; font-size: .75rem; }
  .empty { color: #8b949e; padding: 2rem; text-align: center; border: 1px dashed #30363d;
           border-radius: 6px; }
  .nav a { color: #58a6ff; text-decoration: none; margin-right: 1rem; font-size: .85rem; }
  .nav { margin-bottom: 1rem; }
  @media (max-width: 500px) {
    th.hide-sm, td.hide-sm { display: none; }
  }
</style>
</head>
<body>
<div class="nav">
  <a href="/">home</a>
  <a href="/projects.html">projects</a>
  <a href="/tasks.html">tasks</a>
</div>
<h1>Migration Status</h1>
<div class="sub" id="updated">Loading...</div>
<div id="content"></div>
<script>
function fmtTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleString([], { month: 'short', day: 'numeric',
                                  hour: '2-digit', minute: '2-digit' });
  } catch (e) { return iso; }
}
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function render(data) {
  const updated = document.getElementById('updated');
  const content = document.getElementById('content');
  updated.textContent = data.last_updated
    ? 'Last updated ' + fmtTime(data.last_updated)
    : 'No activity yet';
  const phases = Array.isArray(data.phases) ? data.phases : [];
  if (!phases.length) {
    content.innerHTML = '<div class="empty">No migration phases recorded yet.</div>';
    return;
  }
  const rows = phases.slice().reverse().map(p => {
    const status = escapeHtml(p.status || 'unknown');
    const phase  = escapeHtml(p.phase || '');
    const start  = fmtTime(p.start_time || (p.status === 'in_progress' ? p.recorded_at : ''));
    const end    = fmtTime(p.end_time   || (p.status !== 'in_progress' ? p.recorded_at : ''));
    const notes  = escapeHtml(p.notes || '');
    return `<tr>
      <td>${phase}</td>
      <td class="status ${status}">${status.replace('_',' ')}</td>
      <td class="ts hide-sm">${start}</td>
      <td class="ts hide-sm">${end}</td>
      <td>${notes}</td>
    </tr>`;
  }).join('');
  content.innerHTML = `<table>
    <thead><tr>
      <th>Phase</th><th>Status</th>
      <th class="hide-sm">Start</th><th class="hide-sm">End</th>
      <th>Notes</th>
    </tr></thead>
    <tbody>${rows}</tbody></table>`;
}
fetch('/migration-status.json', { cache: 'no-store' })
  .then(r => r.ok ? r.json() : { last_updated: null, phases: [] })
  .then(render)
  .catch(() => render({ last_updated: null, phases: [] }));
</script>
</body>
</html>
