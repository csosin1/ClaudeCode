# abs-dashboard prod nginx — location blocks ONLY.
#
# On prod (10.116.0.3) the :80/server_name _ server block is already owned by
# /etc/nginx/sites-available/timeshare-surveillance (VPC-allow + deny all).
# Two server blocks on the same listen+server_name would collide, so these
# two location blocks were merged INTO the existing timeshare-surveillance
# server block in Phase 3 step 3.5.
#
# This file is kept as the canonical abs-dashboard prod nginx surface so
# future edits go through the worktree; the merge target on prod is
# /etc/nginx/sites-available/timeshare-surveillance (which carries the
# abs-dashboard blocks at the bottom).
#
# Why longest-prefix / ordering: /CarvanaLoanDashBoard/preview/ must come
# before /CarvanaLoanDashBoard/ so preview requests don't get served by the
# live alias.

# abs-dashboard static site — preview (must come before live)
location /CarvanaLoanDashBoard/preview/ {
    alias /opt/abs-dashboard/carvana_abs/static_site/preview/;
    index index.html;
    try_files $uri $uri/ =404;
}
# abs-dashboard static site — live
location /CarvanaLoanDashBoard/ {
    alias /opt/abs-dashboard/carvana_abs/static_site/live/;
    index index.html;
    try_files $uri $uri/ =404;
}
