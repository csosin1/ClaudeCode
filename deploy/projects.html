<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Projects · casinv.dev</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0f172a; color: #e2e8f0; min-height: 100vh;
    padding: 1rem; line-height: 1.4;
  }
  h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
  .updated { color: #64748b; font-size: 0.75rem; margin-bottom: 1rem; }
  .card {
    background: #1e293b; border: 1px solid #334155; border-radius: 12px;
    padding: 1rem; margin-bottom: 0.75rem;
  }
  .card h2 { font-size: 1rem; margin-bottom: 0.5rem; color: #f8fafc; }
  .links { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.5rem; }
  .links a {
    display: inline-block; padding: 0.4rem 0.8rem;
    border-radius: 6px; text-decoration: none; font-size: 0.85rem;
    background: #334155; color: #e2e8f0;
  }
  .links a.live { background: #059669; }
  .links a.preview { background: #2563eb; }
  .links a.remote { background: #7c3aed; }
  .links a:active { opacity: 0.7; }
  .task { font-size: 0.85rem; color: #94a3b8; margin-top: 0.25rem; }
  .task .stage { font-weight: 600; color: #cbd5e1; }
  .task .stage.blocked { color: #f87171; }
  .task .stage.done { color: #4ade80; }
  .muted { color: #64748b; font-style: italic; }
  .badge {
    display: inline-block; padding: 0.15rem 0.5rem; border-radius: 999px;
    font-size: 0.7rem; font-weight: 600; margin-left: 0.4rem; vertical-align: middle;
    letter-spacing: 0.02em;
  }
  .badge.busy     { background: #1e40af; color: #bfdbfe; }
  .badge.idle     { background: #334155; color: #94a3b8; }
  .badge.stuck    { background: #7f1d1d; color: #fecaca; }
  .badge.archived { background: #44403c; color: #d6d3d1; }
  .liveness { font-size: 0.75rem; color: #64748b; margin-top: 0.25rem; }
  code { background: #0f172a; padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.8rem; }
  .nav { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
  .nav a {
    display: inline-block; padding: 0.55rem 0.9rem; border-radius: 8px;
    font-size: 0.9rem; text-decoration: none; background: #1e293b;
    color: #e2e8f0; border: 1px solid #334155;
  }
  .nav a .count {
    display: inline-block; background: #f59e0b; color: #0f172a;
    border-radius: 999px; padding: 0.05rem 0.5rem; font-size: 0.75rem;
    font-weight: 700; margin-left: 0.35rem;
  }
  .nav a.todo.has-pending { background: #7c2d12; border-color: #ea580c; color: #fff7ed; }
  .nav a.capacity.warn   { background: #78350f; border-color: #f59e0b; color: #fed7aa; }
  .nav a.capacity.urgent { background: #7f1d1d; border-color: #ef4444; color: #fecaca; }
</style>
</head>
<body>
<h1>Projects</h1>
<div class="updated" id="updated">loading…</div>
<div class="nav">
  <a class="todo" id="nav-todo" href="/todo.html">📋 Your to-do<span class="count" id="todo-count" style="display:none"></span></a>
  <a href="/accounts.html">🔑 Accounts</a>
  <a class="capacity" id="nav-capacity" href="/capacity.html">💾 Capacity</a>
  <a id="nav-telemetry" href="/telemetry.html">📊 Usage<span class="count" id="cost-today" style="display:none"></span></a>
</div>
<div id="cards"></div>

<script>
const PROJECTS = [
  { key: 'landing',          name: 'Landing',              live: '/',                       preview: '/preview/' },
  { key: 'games',            name: 'Games',                live: '/games/',                 preview: '/games/preview/' },
  { key: 'carvana-hub',      name: 'Carvana Hub',          live: '/carvana/',               preview: '/carvana/preview/' },
  { key: 'carvana-abs-2',        name: 'Carvana Loan Dashboard',   live: '/CarvanaLoanDashBoard/',   preview: '/CarvanaLoanDashBoard/preview/' },
  { key: 'car-offers',           name: 'Car Offers',               live: '/car-offers/',             preview: '/car-offers/preview/' },
  { key: 'gym-intelligence',     name: 'Gym Intelligence',         live: '/gym-intelligence/',       preview: '/gym-intelligence/preview/' },
  { key: 'timeshare-dashboard',    name: 'Timeshare Credit Dashboard', live: '/timeshare-surveillance/', preview: '/timeshare-surveillance/preview/' },
  { key: 'timeshare-surveillance', name: 'Timeshare Surveillance (pipeline)', live: null,                 preview: null },
  { key: 'infra',                name: 'Infrastructure',           live: null,                       preview: null },
];

async function checkRemote(key) {
  try {
    const r = await fetch('/remote/' + key + '.html', { method: 'HEAD', cache: 'no-cache' });
    return r.ok ? '/remote/' + key + '.html' : null;
  } catch { return null; }
}

function fmtElapsed(s) {
  if (!s) return '';
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60), r = s % 60;
  if (m < 60) return m + 'm' + (r ? ' ' + r + 's' : '');
  const h = Math.floor(m / 60);
  return h + 'h ' + (m % 60) + 'm';
}

async function render() {
  let tasks = { projects: {}, last_updated: '' };
  let live  = { projects: {} };
  try {
    const r = await fetch('/tasks.json?v=' + Date.now(), { cache: 'no-cache' });
    if (r.ok) tasks = await r.json();
  } catch {}
  try {
    const r = await fetch('/liveness.json?v=' + Date.now(), { cache: 'no-cache' });
    if (r.ok) live = await r.json();
  } catch {}
  try {
    const r = await fetch('/pending-actions.json?v=' + Date.now(), { cache: 'no-cache' });
    if (r.ok) {
      const doc = await r.json();
      const n = (doc.actions || []).filter(a => a.status === 'pending').length;
      const countEl = document.getElementById('todo-count');
      const linkEl  = document.getElementById('nav-todo');
      if (n > 0) {
        countEl.textContent = n;
        countEl.style.display = '';
        linkEl.classList.add('has-pending');
      } else {
        countEl.style.display = 'none';
        linkEl.classList.remove('has-pending');
      }
    }
  } catch {}
  try {
    const r = await fetch('/capacity.json?v=' + Date.now(), { cache: 'no-cache' });
    if (r.ok) {
      const doc = await r.json();
      const capEl = document.getElementById('nav-capacity');
      capEl.classList.remove('warn', 'urgent');
      if (doc.overall === 'warn' || doc.overall === 'urgent') {
        capEl.classList.add(doc.overall);
      }
    }
  } catch {}
  try {
    const r = await fetch('/tokens.json?v=' + Date.now(), { cache: 'no-cache' });
    if (r.ok) {
      const doc = await r.json();
      const today = (doc.totals && doc.totals.today && doc.totals.today.cost) || 0;
      const el = document.getElementById('cost-today');
      if (today > 0) {
        el.textContent = '$' + today.toFixed(0);
        el.style.display = '';
      }
    }
  } catch {}

  document.getElementById('updated').textContent =
    'last updated ' + (tasks.last_updated || 'never');

  const remoteChecks = await Promise.all(PROJECTS.map(p => checkRemote(p.key)));

  const cards = PROJECTS.map((p, i) => {
    const remote = remoteChecks[i];
    const t = tasks.projects?.[p.key];
    const cur = t?.current_task;
    const last = t?.last_done;
    const l = live.projects?.[p.key];

    const links = [];
    if (p.live)    links.push(`<a class="live" href="${p.live}">Live</a>`);
    if (p.preview) links.push(`<a class="preview" href="${p.preview}">Preview</a>`);
    if (remote)    links.push(`<a class="remote" href="${remote}">Remote Control</a>`);

    let badge = '', liveness = '';
    if (l) {
      badge = `<span class="badge ${l.status}">${l.status}</span>`;
      if (l.status === 'busy' || l.status === 'stuck') {
        liveness = `<div class="liveness">${l.activity} · ${fmtElapsed(l.elapsed_s)}</div>`;
      } else if (l.status === 'archived') {
        liveness = `<div class="liveness">window not running</div>`;
      }
    }

    let task = '';
    if (cur) {
      const cls = cur.stage === 'blocked' ? 'blocked' : (cur.stage === 'done' ? 'done' : '');
      task = `<div class="task"><span class="stage ${cls}">${cur.stage}</span> · ${cur.name}` +
             (cur.detail ? ` — ${cur.detail}` : '') + `</div>`;
    } else if (last) {
      task = `<div class="task"><span class="stage done">done</span> · ${last.name}` +
             (last.summary ? ` — ${last.summary}` : '') + `</div>`;
    } else if (!l || l.status === 'idle') {
      task = `<div class="task muted">idle</div>`;
    }

    return `<div class="card">
      <h2>${p.name}${badge}</h2>
      <div class="links">${links.join('')}</div>
      ${liveness}
      ${task}
    </div>`;
  }).join('');

  document.getElementById('cards').innerHTML = cards;
}

render();
setInterval(render, 5000);
</script>
</body>
</html>
