<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Timeshare Receivable Surveillance</title>
<link rel="preconnect" href="https://unpkg.com" />
<link rel="preconnect" href="https://cdn.tailwindcss.com" />
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230A0E1A'/><text x='16' y='22' font-family='monospace' font-size='18' fill='%2300A3FF' text-anchor='middle' font-weight='700'>T</text></svg>" />
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.12.0/umd/Recharts.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg: #0A0E1A;
    --card: #111827;
    --border: #1F2937;
    --hgv: #00A3FF;
    --vac: #FF6B35;
    --tnl: #00D48A;
    --critical: #FF3B3B;
    --warning: #FFB800;
    --clean: #00D48A;
    --muted: #64748B;
    --text: #E5E7EB;
  }
  html, body, #root { background: var(--bg); color: var(--text); }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-feature-settings: "tnum", "cv02", "cv03";
  }
  .mono {
    font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    letter-spacing: -0.01em;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid #1F2937;
    border-top-color: #00A3FF;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .chart-wrap { width: 100%; height: 220px; }
  .recharts-tooltip-wrapper .recharts-default-tooltip {
    background: #0A0E1A !important;
    border: 1px solid #1F2937 !important;
    font-family: ui-monospace, monospace;
  }
  a { color: var(--hgv); }
  a:hover { color: #5bd0ff; }
  .scroll-x { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .pill {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 10px 14px; border-radius: 9999px; font-size: 11px;
    cursor: pointer; user-select: none;
    border: 1px solid #1F2937; background: transparent; color: #94A3B8;
    min-height: 44px; min-width: 44px;
  }
  .pill.active { background: #00A3FF22; border-color: #00A3FF; color: #5bd0ff; }
  .switch-wrap {
    display: inline-flex; align-items: center; justify-content: center;
    min-height: 44px; min-width: 44px;
    padding: 12px 4px; cursor: pointer;
  }
  .switch {
    position: relative; width: 36px; height: 20px;
    background: #1F2937; border-radius: 9999px; cursor: pointer;
    transition: background 0.15s;
  }
  .switch.on { background: #00A3FF; }
  .switch::after {
    content: ""; position: absolute; left: 2px; top: 2px;
    width: 16px; height: 16px; border-radius: 9999px; background: #fff;
    transition: left 0.15s;
  }
  .switch.on::after { left: 18px; }
</style>

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useEffect, useMemo, useState } = React;
const {
  LineChart, Line, XAxis, YAxis, Tooltip, Legend, ResponsiveContainer, CartesianGrid
} = Recharts;

// -------------------------------------------------------------
// Constants
// -------------------------------------------------------------
const TICKERS = ["HGV", "VAC", "TNL"];
const COLORS = { HGV: "#00A3FF", VAC: "#FF6B35", TNL: "#00D48A" };
const SEV = { CRITICAL: "#FF3B3B", WARNING: "#FFB800", CLEAN: "#00D48A" };

// HGV brand-segment palette, used when the HGV breakdown toggle is on.
const HGV_SEG_COLORS = {
  legacy_hgv: "#00A3FF",
  diamond:    "#7DD3FC",
  bluegreen:  "#A78BFA",
  consolidated: "#00A3FF",
  originated:   "#00A3FF",
  acquired_at_fv: "#FFB800",
};
const HGV_SEG_DASH = {
  legacy_hgv: "0",
  diamond: "5 3",
  bluegreen: "2 4",
  consolidated: "0",
  originated: "0",
  acquired_at_fv: "4 4",
};

// Title Case labels for segment keys, used in legends and HGV-breakdown UI.
const SEGMENT_LABELS = {
  consolidated:   "Consolidated",
  legacy_hgv:     "Legacy HGV",
  diamond:        "Diamond",
  bluegreen:      "Bluegreen",
  originated:     "Originated",
  acquired_at_fv: "Acquired (fair value)",
  marriott:       "Marriott",
  vistana:        "Vistana",
  welk:           "Welk",
  club_wyndham:   "Club Wyndham",
  margaritaville: "Margaritaville",
};
function toTitleCase(key) {
  if (!key) return "";
  return String(key)
    .split("_")
    .map(p => p.length ? p[0].toUpperCase() + p.slice(1).toLowerCase() : p)
    .join(" ");
}
function segmentLabel(key) {
  return SEGMENT_LABELS[key] || toTitleCase(key);
}

const EDGAR_URLS = {
  HGV: "https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=0001674168&type=10-Q&dateb=&owner=include&count=40",
  VAC: "https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=0001524358&type=10-Q&dateb=&owner=include&count=40",
  TNL: "https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=0001361658&type=10-Q&dateb=&owner=include&count=40"
};

// Threshold logic kept in sync with red_flag_diff.py — drives the
// latest-snapshot strip per ticker.
const THRESHOLDS = {
  CRITICAL: {
    delinquent_90_plus_days_pct:           ["gt", 0.07],
    delinquent_total_pct:                  ["gt", 0.15],
    allowance_coverage_pct:                ["lt", 0.10],
    gain_on_sale_margin_pct:               ["lt", 0.05],
    management_flagged_credit_concerns:    ["eq", true]
  },
  WARNING: {
    delinquent_90_plus_days_pct:           ["gt", 0.05],
    delinquent_total_pct:                  ["gt", 0.10],
    allowance_coverage_pct:                ["lt", 0.12],
    fico_below_600_pct:                    ["gt", 0.15],
    weighted_avg_fico_origination:         ["lt", 680],
  }
};

// Ordered list of metrics shown in the time-series grid.
const TS_METRICS = [
  { key: "delinquent_90_plus_days_pct",         label: "90+ DPD %",                 fmt: "pct" },
  { key: "delinquent_total_pct",                label: "Total DPD %",               fmt: "pct" },
  { key: "allowance_coverage_pct",              label: "Allowance coverage %",      fmt: "pct" },
  { key: "provision_for_loan_losses_mm",        label: "Provision ($mm)",           fmt: "money" },
  { key: "weighted_avg_fico_origination",       label: "Weighted-avg FICO",         fmt: "fico" },
  { key: "fico_below_600_pct",                  label: "FICO <600 %",               fmt: "pct" },
  { key: "gain_on_sale_margin_pct",             label: "Gain-on-sale margin %",     fmt: "pct" },
  { key: "new_securitization_advance_rate_pct", label: "ABS advance rate %",        fmt: "pct" },
  { key: "originations_mm",                     label: "Originations ($mm)",        fmt: "money" },
];

// -------------------------------------------------------------
// Helpers
// -------------------------------------------------------------
function cmp(op, val, target) {
  if (val === null || val === undefined) return false;
  if (op === "gt") return val > target;
  if (op === "lt") return val < target;
  if (op === "eq") return val === target;
  return false;
}
function classifyMetric(metric, val) {
  const c = THRESHOLDS.CRITICAL[metric];
  if (c && cmp(c[0], val, c[1])) return "CRITICAL";
  const w = THRESHOLDS.WARNING[metric];
  if (w && cmp(w[0], val, w[1])) return "WARNING";
  return "CLEAN";
}
function tickerSeverity(rec) {
  if (!rec) return "CLEAN";
  let worst = "CLEAN";
  for (const m of [
    "delinquent_90_plus_days_pct",
    "delinquent_total_pct",
    "allowance_coverage_pct",
    "fico_below_600_pct",
    "weighted_avg_fico_origination",
    "management_flagged_credit_concerns",
  ]) {
    const sev = classifyMetric(m, rec[m]);
    if (sev === "CRITICAL") return "CRITICAL";
    if (sev === "WARNING") worst = "WARNING";
  }
  return worst;
}
// Returns { triggered: [rule keys that fired at CRITICAL or WARNING, excluding
// the management-flag narrative rule], management_flag: bool }.
function evaluateTriggers(rec) {
  const triggered = [];
  let management_flag = false;
  if (!rec) return { triggered, management_flag };
  for (const tier of ["CRITICAL", "WARNING"]) {
    const rules = THRESHOLDS[tier] || {};
    for (const [metric, spec] of Object.entries(rules)) {
      const [op, target] = spec;
      const val = rec[metric];
      if (!cmp(op, val, target)) continue;
      if (metric === "management_flagged_credit_concerns") {
        management_flag = true;
      } else if (!triggered.includes(metric)) {
        triggered.push(metric);
      }
    }
  }
  if (rec.management_flagged_credit_concerns === true) management_flag = true;
  return { triggered, management_flag };
}
function severitySuffix(rec) {
  const { triggered, management_flag } = evaluateTriggers(rec);
  const hasQuant = triggered.length > 0;
  if (hasQuant && management_flag) return " · Threshold + Narrative";
  if (hasQuant) return " · Threshold";
  if (management_flag) return " · Narrative";
  return "";
}

function fmtPct(v, digits = 2) {
  if (v === null || v === undefined || Number.isNaN(v)) return "—";
  return (v * 100).toFixed(digits) + "%";
}
function fmtMoney(v) {
  if (v === null || v === undefined || Number.isNaN(v)) return "—";
  return "$" + Number(v).toLocaleString(undefined, { maximumFractionDigits: 0 });
}
function fmtFico(v) {
  if (v === null || v === undefined || Number.isNaN(v)) return "—";
  return Math.round(v);
}
function fmtQuarter(periodEnd) {
  if (!periodEnd) return "—";
  const d = new Date(periodEnd);
  if (Number.isNaN(d.getTime())) return String(periodEnd);
  const m = d.getUTCMonth() + 1;
  const q = m <= 3 ? 1 : m <= 6 ? 2 : m <= 9 ? 3 : 4;
  return `Q${q} ${d.getUTCFullYear()}`;
}
function sortByPeriod(arr) {
  return [...arr].sort((a, b) => new Date(a.period_end) - new Date(b.period_end));
}
function latestPerTicker(all) {
  const out = {};
  for (const t of TICKERS) {
    const rows = sortByPeriod(all.filter(r => r.ticker === t));
    out[t] = rows.length ? rows[rows.length - 1] : null;
  }
  return out;
}
function withinRange(periodEnd, rangeYears, latestDate) {
  if (!periodEnd) return false;
  if (rangeYears === "all") return true;
  const d = new Date(periodEnd);
  const cutoff = new Date(latestDate);
  cutoff.setUTCFullYear(cutoff.getUTCFullYear() - rangeYears);
  return d >= cutoff;
}

// -------------------------------------------------------------
// Series builders
// -------------------------------------------------------------
function buildBaseSeries(records, metric) {
  const buckets = {};
  for (const r of records) {
    const key = r.period_end;
    if (!key) continue;
    if (!buckets[key]) buckets[key] = { period_end: key, label: fmtQuarter(key) };
    const v = r[metric];
    buckets[key][r.ticker] = (v === undefined ? null : v);
  }
  return Object.values(buckets).sort((a, b) => new Date(a.period_end) - new Date(b.period_end));
}

// brandKeys = ["legacy_hgv","diamond","bluegreen"] (default brand mode) or
// ["originated","acquired_at_fv"] (cohort mode).
function buildHgvSegmentSeries(records, metric, brandKeys) {
  const buckets = {};
  for (const r of records) {
    const key = r.period_end;
    if (!key) continue;
    if (!buckets[key]) buckets[key] = { period_end: key, label: fmtQuarter(key) };
    if (r.ticker === "HGV") continue;
    const v = r[metric];
    buckets[key][r.ticker] = (v === undefined ? null : v);
  }
  for (const r of records) {
    if (r.ticker !== "HGV") continue;
    const key = r.period_end;
    if (!key) continue;
    if (!buckets[key]) buckets[key] = { period_end: key, label: fmtQuarter(key) };
    const segs = Array.isArray(r.segments) ? r.segments : [];
    for (const sk of brandKeys) {
      const seg = segs.find(s => s && s.segment_key === sk);
      const v = seg ? seg[metric] : null;
      buckets[key]["HGV_" + sk] = (v === undefined || v === null) ? null : v;
    }
  }
  return Object.values(buckets).sort((a, b) => new Date(a.period_end) - new Date(b.period_end));
}

function pickYFmt(metricFmt) {
  if (metricFmt === "pct") return (v) => `${(v * 100).toFixed(1)}%`;
  if (metricFmt === "money") return (v) => `$${Math.round(v)}`;
  if (metricFmt === "fico") return (v) => Math.round(v);
  return (v) => v;
}

// True if any HGV record has at least one segment row carrying this metric.
function hgvHasSegmentMetric(records, metric, brandKeys) {
  for (const r of records) {
    if (r.ticker !== "HGV") continue;
    const segs = Array.isArray(r.segments) ? r.segments : [];
    for (const sk of brandKeys) {
      const seg = segs.find(s => s && s.segment_key === sk);
      if (seg && seg[metric] !== null && seg[metric] !== undefined) return true;
    }
  }
  return false;
}

// -------------------------------------------------------------
// UI bits
// -------------------------------------------------------------
function Card({ children, className = "", style = {}, ...rest }) {
  return (
    <div
      className={`rounded-lg p-4 ${className}`}
      style={{ background: "var(--card)", border: "1px solid var(--border)", ...style }}
      {...rest}
    >{children}</div>
  );
}

function Header({ latestPeriod, parsedAt }) {
  return (
    <div data-testid="hdr" className="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-6">
      <div>
        <h1 className="mono text-xl md:text-2xl font-bold tracking-tight">Timeshare Receivable Surveillance</h1>
        <div className="text-slate-400 text-xs mono mt-1">
          <span style={{ color: COLORS.HGV }}>HGV</span>
          <span className="text-slate-600 mx-1">·</span>
          <span style={{ color: COLORS.VAC }}>VAC</span>
          <span className="text-slate-600 mx-1">·</span>
          <span style={{ color: COLORS.TNL }}>TNL</span>
        </div>
      </div>
      <div className="text-[11px] mono text-slate-400">
        <div>As of: <span className="text-slate-200">{latestPeriod ? fmtQuarter(latestPeriod) : "—"}</span></div>
        <div>Parsed: <span className="text-slate-200">{parsedAt || "never"}</span></div>
      </div>
    </div>
  );
}

function Cell({ label, value, sev }) {
  const color = sev === "CRITICAL" ? SEV.CRITICAL : sev === "WARNING" ? SEV.WARNING : "#E5E7EB";
  return (
    <>
      <div className="text-slate-500">{label}</div>
      <div className="mono text-right" style={{ color }}>{value}</div>
    </>
  );
}

function SnapshotStrip({ latest }) {
  return (
    <div data-testid="snapshot-strip" className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      {TICKERS.map(t => {
        const r = latest[t];
        const sev = tickerSeverity(r);
        const sevColor = sev === "CRITICAL" ? SEV.CRITICAL : sev === "WARNING" ? SEV.WARNING : SEV.CLEAN;
        const flagged = !!(r && r.management_flagged_credit_concerns);
        const sevSuffix = sev === "CLEAN" ? "" : severitySuffix(r);
        const sevLabel = sev + sevSuffix;
        return (
          <div
            key={t}
            data-ticker={t}
            className="rounded-lg p-4"
            style={{ background: "var(--card)", border: "1px solid var(--border)", borderTop: `3px solid ${COLORS[t]}` }}
          >
            <div className="flex items-baseline justify-between mb-3">
              <div className="mono font-bold text-lg" style={{ color: COLORS[t] }}>{t}</div>
              <div className="flex items-center gap-2">
                {flagged && (
                  <span className="mono text-[10px] font-semibold px-2 py-0.5 rounded"
                        style={{ background: "#FF3B3B22", border: "1px solid #FF3B3B55", color: "#FF3B3B" }}>
                    Mgmt flagged
                  </span>
                )}
                <span data-testid="sev-badge" data-ticker-sev={t}
                      className="mono text-[10px] font-semibold px-2 py-0.5 rounded"
                      style={{ background: `${sevColor}22`, border: `1px solid ${sevColor}55`, color: sevColor }}>
                  {sevLabel}
                </span>
              </div>
            </div>
            {!r ? (
              <div className="text-[12px] text-slate-500">No filings yet.</div>
            ) : (
              <div className="grid grid-cols-2 gap-y-2 gap-x-3 text-[11px]">
                <Cell label="90+ DPD"      value={fmtPct(r.delinquent_90_plus_days_pct)}
                      sev={classifyMetric("delinquent_90_plus_days_pct", r.delinquent_90_plus_days_pct)} />
                <Cell label="Total DPD"    value={fmtPct(r.delinquent_total_pct)}
                      sev={classifyMetric("delinquent_total_pct", r.delinquent_total_pct)} />
                <Cell label="Coverage"     value={fmtPct(r.allowance_coverage_pct)}
                      sev={classifyMetric("allowance_coverage_pct", r.allowance_coverage_pct)} />
                <Cell label="Wtd FICO"     value={fmtFico(r.weighted_avg_fico_origination)}
                      sev={classifyMetric("weighted_avg_fico_origination", r.weighted_avg_fico_origination)} />
                <Cell label="FICO <600"    value={fmtPct(r.fico_below_600_pct)}
                      sev={classifyMetric("fico_below_600_pct", r.fico_below_600_pct)} />
                <Cell label="Period"       value={fmtQuarter(r.period_end)} />
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// Returns true iff at least one row carries a non-null value under `key`.
function seriesHasData(data, key) {
  for (const row of data) {
    const v = row[key];
    if (v !== null && v !== undefined && !Number.isNaN(v)) return true;
  }
  return false;
}

function MetricChart({ metric, records, range, latestDate, hgvBreakdown, cohortMode }) {
  const filtered = useMemo(
    () => records.filter(r => withinRange(r.period_end, range, latestDate)),
    [records, range, latestDate]
  );

  const brandKeys = cohortMode === "cohort"
    ? ["originated", "acquired_at_fv"]
    : ["legacy_hgv", "diamond", "bluegreen"];

  const hasHgvSegment = useMemo(
    () => hgvBreakdown && hgvHasSegmentMetric(filtered, metric.key, brandKeys),
    [filtered, metric.key, hgvBreakdown, brandKeys.join(",")]
  );

  const data = useMemo(() => (
    hasHgvSegment
      ? buildHgvSegmentSeries(filtered, metric.key, brandKeys)
      : buildBaseSeries(filtered, metric.key)
  ), [filtered, metric.key, hasHgvSegment, brandKeys.join(",")]);

  // Determine which series keys actually have non-null data in the active
  // range. Ghost legend entries and ghost Lines get filtered out here.
  const activeSeries = useMemo(() => {
    const seriesKeys = hasHgvSegment
      ? [...brandKeys.map(sk => "HGV_" + sk), "VAC", "TNL"]
      : [...TICKERS];
    return seriesKeys.filter(k => seriesHasData(data, k));
  }, [data, hasHgvSegment, brandKeys.join(",")]);

  // A per-series, null-filtered dataset. Recharts draws continuous lines off
  // these slim datasets, so intermediate nulls no longer break the line.
  const seriesData = useMemo(() => {
    const out = {};
    for (const k of activeSeries) {
      out[k] = data
        .filter(row => row[k] !== null && row[k] !== undefined && !Number.isNaN(row[k]))
        .map(row => ({ period_end: row.period_end, label: row.label, value: row[k] }));
    }
    return out;
  }, [data, activeSeries.join(",")]);

  const yFmt = pickYFmt(metric.fmt);
  const axisProps = {
    stroke: "#475569",
    tick: { fill: "#94A3B8", fontSize: 10, fontFamily: "ui-monospace, monospace" },
    tickLine: { stroke: "#475569" },
    axisLine: { stroke: "#1F2937" }
  };

  const noActive = activeSeries.length === 0;
  const noHgvSeg = hgvBreakdown && !hasHgvSegment;

  // Human label for a series key (HGV_legacy_hgv -> "HGV Legacy HGV"; TNL -> "TNL").
  const seriesLabel = (k) => {
    if (k.startsWith("HGV_")) return "HGV " + segmentLabel(k.slice(4));
    return k;
  };
  const seriesStroke = (k) => {
    if (k.startsWith("HGV_")) return HGV_SEG_COLORS[k.slice(4)] || COLORS.HGV;
    return COLORS[k] || "#94A3B8";
  };
  const seriesDash = (k) => {
    if (k.startsWith("HGV_")) return HGV_SEG_DASH[k.slice(4)] || "0";
    return "0";
  };

  return (
    <div data-chart={metric.key} data-testid="chart-card" className="rounded-lg p-3"
         style={{ background: "var(--card)", border: "1px solid var(--border)" }}>
      <div
        data-testid="chart-title-row"
        className={`flex items-baseline justify-between mb-2 px-1 ${noActive ? "opacity-50" : ""}`}
      >
        <div className="mono text-[11px] uppercase tracking-widest text-slate-400">{metric.label}</div>
        {noHgvSeg && !noActive && (
          <div className="mono text-[10px] text-slate-500">HGV: n/a</div>
        )}
      </div>
      <div className="chart-wrap">
        {noActive ? (
          <div
            data-testid="chart-empty"
            className="h-full w-full flex items-center justify-center text-slate-500 italic text-sm"
          >
            No data in this range
          </div>
        ) : (
          <ResponsiveContainer width="100%" height="100%">
            <LineChart margin={{ top: 5, right: 12, left: 0, bottom: 0 }}>
              <CartesianGrid stroke="#1F2937" vertical={false} />
              <XAxis
                dataKey="label"
                type="category"
                allowDuplicatedCategory={false}
                {...axisProps}
                minTickGap={20}
              />
              <YAxis {...axisProps} tickFormatter={yFmt} width={56} />
              <Tooltip
                contentStyle={{ background: "#0A0E1A", border: "1px solid #1F2937", fontFamily: "ui-monospace, monospace", fontSize: 12 }}
                labelStyle={{ color: "#94A3B8" }}
                formatter={(v, name) => [v === null || v === undefined ? "—" : yFmt(v), name]}
              />
              <Legend wrapperStyle={{ fontSize: 10, fontFamily: "ui-monospace, monospace", color: "#94A3B8" }} />
              {activeSeries.map(k => (
                <Line
                  key={k}
                  data-line={k}
                  data={seriesData[k]}
                  type="monotone"
                  dataKey="value"
                  name={seriesLabel(k)}
                  stroke={seriesStroke(k)}
                  strokeDasharray={seriesDash(k)}
                  strokeWidth={2}
                  dot={{ r: 1.5 }}
                  connectNulls
                  isAnimationActive={false}
                />
              ))}
            </LineChart>
          </ResponsiveContainer>
        )}
      </div>
    </div>
  );
}

function Footer() {
  return (
    <div data-testid="footer" className="mt-10 pb-10 text-[11px] mono text-slate-500 leading-relaxed">
      <div className="mb-2">Data: SEC EDGAR. Parsed by Claude AI. Not investment advice.</div>
      <div className="flex flex-wrap gap-x-4 gap-y-1 mb-2">
        {TICKERS.map(t => (
          <a key={t} href={EDGAR_URLS[t]} target="_blank" rel="noopener noreferrer" style={{ color: COLORS[t] }}>
            {t} filings on EDGAR ↗
          </a>
        ))}
      </div>
      <div>Dashboard:</div>
      <div>https://casinv.dev/timeshare-surveillance/</div>
      <div className="mt-2">Admin: <a href="./admin/">/timeshare-surveillance/admin/</a></div>
    </div>
  );
}

// -------------------------------------------------------------
// App
// -------------------------------------------------------------
const RANGE_OPTIONS = [
  { key: 1,     label: "1y" },
  { key: 3,     label: "3y" },
  { key: 5,     label: "5y" },
  { key: "all", label: "all" },
];

function App() {
  const [records, setRecords] = useState([]);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState(null);
  const [range, setRange] = useState(5);
  const [hgvBreakdown, setHgvBreakdown] = useState(false);
  const [cohortMode, setCohortMode] = useState("brand"); // "brand" | "cohort"

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const r = await fetch("./data/combined.json", { cache: "no-store" });
        if (!r.ok) throw new Error("HTTP " + r.status);
        const j = await r.json();
        if (!cancelled) {
          setRecords(Array.isArray(j) ? j : []);
          setLoading(false);
        }
      } catch (e) {
        if (!cancelled) {
          setErr(e && e.message ? e.message : String(e));
          setRecords([]);
          setLoading(false);
        }
      }
    })();
    return () => { cancelled = true; };
  }, []);

  const latest = useMemo(() => latestPerTicker(records), [records]);
  const latestDate = useMemo(() => {
    const ds = Object.values(latest).filter(Boolean).map(r => r.period_end).filter(Boolean).sort();
    return ds.length ? ds[ds.length - 1] : null;
  }, [latest]);
  const parsedAt = useMemo(() => {
    const ts = Object.values(latest).filter(Boolean).map(r => r.extracted_at).filter(Boolean).sort();
    return ts.length ? ts[ts.length - 1] : null;
  }, [latest]);

  const isEmpty = !loading && records.length === 0;

  return (
    <div className="max-w-[1400px] mx-auto px-4 py-5">
      <Header latestPeriod={latestDate} parsedAt={parsedAt} />

      {loading && (
        <Card className="mb-6">
          <div className="flex items-center gap-3 text-slate-300 text-sm">
            <div className="spinner" />
            <div>Loading filings…</div>
          </div>
        </Card>
      )}

      {isEmpty && (
        <Card data-testid="empty-state" className="mb-6" style={{ borderColor: "#FFB80055" }}>
          <div className="flex items-center gap-3">
            <div className="spinner" />
            <div className="text-sm text-slate-300">
              Pipeline warming up — no filings ingested yet. The dashboard will populate as soon as
              the first quarter lands.
              {err && <span className="block mt-1 text-[11px] text-slate-500">fetch status: {err}</span>}
            </div>
          </div>
        </Card>
      )}

      {!isEmpty && !loading && (
        <>
          <SnapshotStrip latest={latest} />

          <div data-testid="ts-controls" className="flex flex-wrap items-center gap-3 mb-4">
            <div className="flex items-center gap-1" data-testid="range-pills">
              {RANGE_OPTIONS.map(o => (
                <button
                  key={o.label}
                  data-range={o.label}
                  className={`pill ${range === o.key ? "active" : ""}`}
                  onClick={() => setRange(o.key)}
                >{o.label}</button>
              ))}
            </div>
            <div className="flex items-center gap-2 ml-2" data-testid="hgv-toggle">
              <span className="text-[11px] text-slate-400 mono">HGV breakdown</span>
              <div
                className="switch-wrap"
                onClick={() => setHgvBreakdown(v => !v)}
              >
                <div
                  role="switch"
                  aria-checked={hgvBreakdown}
                  className={`switch ${hgvBreakdown ? "on" : ""}`}
                />
              </div>
            </div>
            {hgvBreakdown && (
              <div className="flex items-center gap-1" data-testid="cohort-mode">
                <button
                  className={`pill ${cohortMode === "brand" ? "active" : ""}`}
                  onClick={() => setCohortMode("brand")}
                >by brand</button>
                <button
                  className={`pill ${cohortMode === "cohort" ? "active" : ""}`}
                  onClick={() => setCohortMode("cohort")}
                >acquisition cohort</button>
              </div>
            )}
          </div>

          <div data-testid="charts-grid" className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-6">
            {TS_METRICS.map(m => (
              <MetricChart
                key={m.key}
                metric={m}
                records={records}
                range={range}
                latestDate={latestDate}
                hgvBreakdown={hgvBreakdown}
                cohortMode={cohortMode}
              />
            ))}
          </div>
        </>
      )}

      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
