<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adler's Dino Dash!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: white;
            overflow: hidden;
        }
        #hero-title {
            font-size: 52px;
            font-weight: 900;
            background: linear-gradient(135deg, #FFD700, #FF6B35, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            filter: drop-shadow(3px 3px 4px rgba(0,0,0,0.5));
            margin-bottom: 2px;
            letter-spacing: 2px;
        }
        #subtitle {
            font-size: 15px;
            color: #aaa;
            margin-bottom: 10px;
        }
        #scoreboard {
            display: flex;
            gap: 40px;
            margin-bottom: 8px;
            font-size: 20px;
            font-weight: bold;
        }
        #scoreboard span { color: #FFD700; }
        canvas {
            border: 3px solid #FF6B35;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255, 107, 53, 0.3);
        }
        #message {
            margin-top: 10px;
            font-size: 18px;
            color: #aaa;
            height: 24px;
        }
    </style>
</head>
<body>
    <div id="hero-title">ADLER'S DINO DASH!</div>
    <div id="subtitle">Arrow keys to move. Dodge dinosaurs and knives!</div>
    <div id="scoreboard">
        Score: <span id="score">0</span>
        &nbsp;&nbsp;
        Best: <span id="best">0</span>
    </div>
    <canvas id="game" width="700" height="500"></canvas>
    <div id="message">Press any arrow key to start!</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const W = canvas.width;
        const H = canvas.height;

        let player, obstacles, coins, particles, score, best, gameOver, started;
        let keys = {};
        let spawnTimer = 0;
        let coinTimer = 0;
        let difficulty = 1;
        let groundY = H - 60;
        let frameCount = 0;
        let lastTime = 0;
        let deathMessage = '';

        best = parseInt(localStorage.getItem('adlerDinoBest') || '0');
        document.getElementById('best').textContent = best;

        // Background stars
        let stars = [];
        for (let i = 0; i < 0; i++) {
            stars.push({ x: Math.random() * W, y: Math.random() * H * 0.6, size: Math.random() * 2, flicker: Math.random() * Math.PI });
        }

        // Background clouds
        let clouds = [];
        for (let i = 0; i < 5; i++) {
            clouds.push({
                x: Math.random() * W,
                y: 30 + Math.random() * 100,
                size: 30 + Math.random() * 40,
                speed: 0.2 + Math.random() * 0.3
            });
        }

        function init() {
            player = {
                x: 100,
                y: groundY - 40,
                w: 36,
                h: 40,
                vy: 0,
                onGround: true,
                facing: 1,
                walkFrame: 0,
                invincible: 0,
                lives: 3
            };
            obstacles = [];
            coins = [];
            particles = [];
            score = 0;
            spawnTimer = 0;
            coinTimer = 0;
            difficulty = 1;
            gameOver = false;
            started = false;
            frameCount = 0;
            deathMessage = '';
            document.getElementById('score').textContent = '0';
            document.getElementById('message').textContent = 'Press any arrow key to start!';
        }

        // Dinosaur types
        const DINO_TYPES = [
            { name: 'T-Rex', color: '#4CAF50', darkColor: '#2E7D32', w: 50, h: 45, speed: 2, points: 0, legs: true, arms: true, teeth: true },
            { name: 'Raptor', color: '#FF9800', darkColor: '#E65100', w: 40, h: 35, speed: 3.5, points: 0, legs: true, arms: true, teeth: true },
            { name: 'Triceratops', color: '#9C27B0', darkColor: '#6A1B9A', w: 55, h: 40, speed: 1.5, points: 0, legs: true, horns: true },
            { name: 'Pterodactyl', color: '#00BCD4', darkColor: '#00838F', w: 50, h: 30, speed: 3, points: 0, flying: true, wings: true },
        ];

        function spawnDino() {
            const type = DINO_TYPES[Math.floor(Math.random() * DINO_TYPES.length)];
            const fromLeft = Math.random() > 0.5;
            const speedMult = 1 + (difficulty - 1) * 0.3;
            const y = type.flying ? groundY - 80 - Math.random() * 80 : groundY - type.h;
            obstacles.push({
                ...type,
                x: fromLeft ? -type.w : W + type.w,
                y: y,
                dir: fromLeft ? 1 : -1,
                speed: type.speed * speedMult * (fromLeft ? 1 : -1),
                frame: Math.random() * Math.PI * 2,
                kind: 'dino'
            });
        }

        function spawnKnife() {
            const fromLeft = Math.random() > 0.5;
            const speedMult = 1 + (difficulty - 1) * 0.4;
            const y = groundY - 60 - Math.random() * 150;
            obstacles.push({
                x: fromLeft ? -20 : W + 20,
                y: y,
                w: 30,
                h: 8,
                speed: (4 + Math.random() * 3) * speedMult * (fromLeft ? 1 : -1),
                dir: fromLeft ? 1 : -1,
                rotation: 0,
                rotSpeed: (fromLeft ? 1 : -1) * (0.15 + Math.random() * 0.1),
                kind: 'knife',
                frame: 0
            });
        }

        function spawnCoin() {
            coins.push({
                x: 50 + Math.random() * (W - 100),
                y: groundY - 60 - Math.random() * 160,
                size: 12,
                life: 300,
                bob: Math.random() * Math.PI * 2
            });
        }

        function spawnParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * 4;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 2,
                    life: 1,
                    decay: 0.02 + Math.random() * 0.03,
                    color,
                    size: 2 + Math.random() * 4
                });
            }
        }

        // Drawing functions
        function drawBackground() {
            // Sky gradient
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#4a90d9');
            grad.addColorStop(0.5, '#87CEEB');
            grad.addColorStop(0.7, '#B8E8FF');
            grad.addColorStop(0.75, '#4CAF50');
            grad.addColorStop(1, '#2E7D32');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            // Clouds
            clouds.forEach(c => {
                c.x += c.speed;
                if (c.x > W + c.size * 2) c.x = -c.size * 2;
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.size, 0, Math.PI * 2);
                ctx.arc(c.x + c.size * 0.6, c.y - c.size * 0.15, c.size * 0.7, 0, Math.PI * 2);
                ctx.arc(c.x - c.size * 0.4, c.y + c.size * 0.1, c.size * 0.5, 0, Math.PI * 2);
                ctx.fill();
            });

            // Ground line
            ctx.fillStyle = '#5D4037';
            ctx.fillRect(0, groundY, W, 3);

            // Grass tufts
            ctx.fillStyle = '#66BB6A';
            for (let x = 0; x < W; x += 20) {
                const h = 5 + Math.sin(x * 0.15 + frameCount * 0.02) * 3;
                ctx.beginPath();
                ctx.moveTo(x, groundY);
                ctx.lineTo(x + 3, groundY - h);
                ctx.lineTo(x + 6, groundY);
                ctx.fill();
            }
        }

        function drawAdler() {
            const p = player;
            const cx = p.x + p.w / 2;
            const cy = p.y;

            // Flash when invincible
            if (p.invincible > 0 && Math.floor(frameCount / 4) % 2 === 0) {
                ctx.globalAlpha = 0.4;
            }

            const facing = p.facing;
            p.walkFrame += (keys['ArrowLeft'] || keys['ArrowRight']) ? 0.15 : 0;

            ctx.save();
            ctx.translate(cx, cy);
            if (facing < 0) ctx.scale(-1, 1);

            // Legs (animated)
            const legSwing = Math.sin(p.walkFrame) * 8;
            ctx.fillStyle = '#1565C0';
            // Left leg
            ctx.fillRect(-8, 22, 7, 18 + (p.onGround ? legSwing : -5));
            // Right leg
            ctx.fillRect(1, 22, 7, 18 + (p.onGround ? -legSwing : -5));

            // Shoes
            ctx.fillStyle = '#333';
            ctx.fillRect(-10, 38 + (p.onGround ? legSwing : -5), 10, 4);
            ctx.fillRect(-1, 38 + (p.onGround ? -legSwing : -5), 10, 4);

            // Body (shirt)
            ctx.fillStyle = '#F44336';
            ctx.fillRect(-10, 2, 20, 22);

            // Arms
            const armSwing = Math.sin(p.walkFrame) * 12;
            ctx.fillStyle = '#FFB74D';
            ctx.save();
            ctx.translate(10, 8);
            ctx.rotate((armSwing) * Math.PI / 180);
            ctx.fillRect(0, -3, 6, 16);
            ctx.restore();
            ctx.save();
            ctx.translate(-10, 8);
            ctx.rotate((-armSwing) * Math.PI / 180);
            ctx.fillRect(-6, -3, 6, 16);
            ctx.restore();

            // Head
            ctx.fillStyle = '#FFD4A8';
            ctx.beginPath();
            ctx.arc(0, -4, 12, 0, Math.PI * 2);
            ctx.fill();

            // Hair
            ctx.fillStyle = '#5D4037';
            ctx.beginPath();
            ctx.arc(0, -9, 11, Math.PI, 0);
            ctx.fill();
            ctx.fillRect(-11, -10, 22, 5);

            // Eyes
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(4, -5, 2, 0, Math.PI * 2);
            ctx.fill();

            // Smile
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(3, -1, 4, 0.1, Math.PI - 0.1);
            ctx.stroke();

            // Name tag on shirt
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 6px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('ADLER', 0, 16);

            ctx.restore();

            // Lives display
            ctx.globalAlpha = 1;
            for (let i = 0; i < p.lives; i++) {
                ctx.fillStyle = '#FF5252';
                ctx.beginPath();
                const hx = 20 + i * 25;
                const hy = groundY + 25;
                ctx.moveTo(hx, hy + 4);
                ctx.bezierCurveTo(hx, hy, hx - 8, hy, hx - 8, hy + 4);
                ctx.bezierCurveTo(hx - 8, hy + 10, hx, hy + 14, hx, hy + 17);
                ctx.bezierCurveTo(hx, hy + 14, hx + 8, hy + 10, hx + 8, hy + 4);
                ctx.bezierCurveTo(hx + 8, hy, hx, hy, hx, hy + 4);
                ctx.fill();
            }
            ctx.fillStyle = '#fff';
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText('x ' + p.lives, 75, groundY + 37);

            ctx.globalAlpha = 1;
        }

        function drawDino(o) {
            ctx.save();
            ctx.translate(o.x + o.w / 2, o.y + o.h / 2);
            if (o.dir < 0) ctx.scale(-1, 1);
            const hw = o.w / 2;
            const hh = o.h / 2;
            o.frame += 0.08;

            if (o.flying) {
                // Pterodactyl
                const wingFlap = Math.sin(o.frame * 3) * 15;

                // Body
                ctx.fillStyle = o.color;
                ctx.beginPath();
                ctx.ellipse(0, 0, hw * 0.6, hh * 0.4, 0, 0, Math.PI * 2);
                ctx.fill();

                // Head
                ctx.fillStyle = o.color;
                ctx.beginPath();
                ctx.arc(hw * 0.5, -hh * 0.1, hh * 0.35, 0, Math.PI * 2);
                ctx.fill();

                // Beak
                ctx.fillStyle = '#FFA000';
                ctx.beginPath();
                ctx.moveTo(hw * 0.8, -hh * 0.1);
                ctx.lineTo(hw * 1.2, 0);
                ctx.lineTo(hw * 0.8, hh * 0.1);
                ctx.fill();

                // Eye
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(hw * 0.6, -hh * 0.2, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(hw * 0.65, -hh * 0.2, 1.5, 0, Math.PI * 2);
                ctx.fill();

                // Wings
                ctx.fillStyle = o.darkColor;
                ctx.beginPath();
                ctx.moveTo(-hw * 0.3, 0);
                ctx.lineTo(-hw * 0.9, -hh - wingFlap);
                ctx.lineTo(-hw * 0.1, -hh * 0.1);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(-hw * 0.3, 0);
                ctx.lineTo(-hw * 0.9, hh + wingFlap * 0.3);
                ctx.lineTo(-hw * 0.1, hh * 0.1);
                ctx.fill();

                // Crest
                ctx.fillStyle = '#FF5722';
                ctx.beginPath();
                ctx.moveTo(hw * 0.4, -hh * 0.4);
                ctx.lineTo(hw * 0.1, -hh * 0.9);
                ctx.lineTo(hw * 0.6, -hh * 0.3);
                ctx.fill();
            } else if (o.horns) {
                // Triceratops
                const legSwing = Math.sin(o.frame * 2) * 5;

                // Body
                ctx.fillStyle = o.color;
                ctx.beginPath();
                ctx.ellipse(0, 0, hw, hh * 0.7, 0, 0, Math.PI * 2);
                ctx.fill();

                // Legs
                ctx.fillStyle = o.darkColor;
                ctx.fillRect(-hw * 0.5, hh * 0.3, 8, 12 + legSwing);
                ctx.fillRect(hw * 0.2, hh * 0.3, 8, 12 - legSwing);
                ctx.fillRect(-hw * 0.2, hh * 0.3, 8, 12 - legSwing);
                ctx.fillRect(hw * 0.5, hh * 0.3, 8, 12 + legSwing);

                // Head shield
                ctx.fillStyle = o.color;
                ctx.beginPath();
                ctx.arc(hw * 0.7, -hh * 0.1, hh * 0.7, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = o.darkColor;
                ctx.beginPath();
                ctx.arc(hw * 0.7, -hh * 0.1, hh * 0.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = o.color;
                ctx.beginPath();
                ctx.arc(hw * 0.7, -hh * 0.1, hh * 0.35, 0, Math.PI * 2);
                ctx.fill();

                // Horns
                ctx.fillStyle = '#FFF9C4';
                ctx.beginPath();
                ctx.moveTo(hw * 0.8, -hh * 0.4);
                ctx.lineTo(hw * 1.3, -hh * 0.9);
                ctx.lineTo(hw * 0.9, -hh * 0.3);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(hw * 0.7, -hh * 0.5);
                ctx.lineTo(hw * 1.0, -hh * 1.0);
                ctx.lineTo(hw * 0.8, -hh * 0.5);
                ctx.fill();
                // Nose horn
                ctx.beginPath();
                ctx.moveTo(hw * 1.0, hh * 0.0);
                ctx.lineTo(hw * 1.3, -hh * 0.2);
                ctx.lineTo(hw * 1.1, hh * 0.1);
                ctx.fill();

                // Eye
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(hw * 0.6, -hh * 0.1, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(hw * 0.65, -hh * 0.1, 2, 0, Math.PI * 2);
                ctx.fill();

                // Tail
                ctx.strokeStyle = o.color;
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(-hw, 0);
                ctx.quadraticCurveTo(-hw - 15, -5, -hw - 20, 5);
                ctx.stroke();
            } else {
                // T-Rex / Raptor
                const legSwing = Math.sin(o.frame * 3) * 8;

                // Tail
                ctx.fillStyle = o.color;
                ctx.beginPath();
                ctx.moveTo(-hw * 0.5, 0);
                ctx.quadraticCurveTo(-hw - 10, -hh * 0.3, -hw - 5, hh * 0.2);
                ctx.lineTo(-hw * 0.3, hh * 0.3);
                ctx.fill();

                // Body
                ctx.fillStyle = o.color;
                ctx.beginPath();
                ctx.ellipse(0, 0, hw * 0.6, hh * 0.6, 0, 0, Math.PI * 2);
                ctx.fill();

                // Belly
                ctx.fillStyle = '#C8E6C9';
                if (o.name === 'Raptor') ctx.fillStyle = '#FFE0B2';
                ctx.beginPath();
                ctx.ellipse(hw * 0.05, hh * 0.1, hw * 0.35, hh * 0.4, 0, 0, Math.PI * 2);
                ctx.fill();

                // Legs
                ctx.fillStyle = o.darkColor;
                ctx.fillRect(hw * 0.0, hh * 0.3, 7, 14 + legSwing);
                ctx.fillRect(-hw * 0.3, hh * 0.3, 7, 14 - legSwing);

                // Feet
                ctx.fillStyle = o.darkColor;
                ctx.fillRect(hw * 0.0 - 3, hh * 0.3 + 12 + legSwing, 13, 4);
                ctx.fillRect(-hw * 0.3 - 3, hh * 0.3 + 12 - legSwing, 13, 4);

                // Head
                ctx.fillStyle = o.color;
                ctx.beginPath();
                ctx.ellipse(hw * 0.5, -hh * 0.3, hw * 0.4, hh * 0.35, -0.2, 0, Math.PI * 2);
                ctx.fill();

                // Jaw / teeth
                if (o.teeth) {
                    ctx.fillStyle = '#FFF9C4';
                    const jawOpen = Math.abs(Math.sin(o.frame * 2)) * 3;
                    ctx.beginPath();
                    ctx.moveTo(hw * 0.7, -hh * 0.15 + jawOpen);
                    ctx.lineTo(hw * 1.0, -hh * 0.1 + jawOpen);
                    ctx.lineTo(hw * 0.7, -hh * 0.0 + jawOpen);
                    ctx.fill();

                    // Teeth
                    ctx.fillStyle = '#fff';
                    for (let t = 0; t < 3; t++) {
                        ctx.fillRect(hw * 0.7 + t * 4, -hh * 0.2 + jawOpen, 2, 4);
                    }
                }

                // Eye
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(hw * 0.55, -hh * 0.4, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#FF0000';
                ctx.beginPath();
                ctx.arc(hw * 0.58, -hh * 0.4, 2, 0, Math.PI * 2);
                ctx.fill();

                // Arms (tiny for T-Rex)
                if (o.arms) {
                    ctx.fillStyle = o.color;
                    const armLen = o.name === 'T-Rex' ? 8 : 14;
                    ctx.save();
                    ctx.translate(hw * 0.2, -hh * 0.05);
                    ctx.rotate(Math.sin(o.frame * 2) * 0.3);
                    ctx.fillRect(0, 0, armLen, 4);
                    ctx.fillRect(armLen - 2, -2, 2, 6);
                    ctx.restore();
                }
            }

            // Name label
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.font = 'bold 10px sans-serif';
            ctx.textAlign = 'center';
            if (o.dir < 0) ctx.scale(-1, 1);
            ctx.fillText(o.name, 0, hh + 24);

            ctx.restore();
        }

        function drawKnife(o) {
            ctx.save();
            ctx.translate(o.x, o.y);
            o.rotation += o.rotSpeed;
            ctx.rotate(o.rotation);

            // Blade
            ctx.fillStyle = '#B0BEC5';
            ctx.beginPath();
            ctx.moveTo(15, 0);
            ctx.lineTo(4, -4);
            ctx.lineTo(-8, -2);
            ctx.lineTo(-8, 2);
            ctx.lineTo(4, 4);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#78909C';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Blade shine
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.beginPath();
            ctx.moveTo(14, -1);
            ctx.lineTo(5, -3);
            ctx.lineTo(-4, -1.5);
            ctx.lineTo(-4, 0);
            ctx.lineTo(5, -1);
            ctx.closePath();
            ctx.fill();

            // Handle
            ctx.fillStyle = '#5D4037';
            ctx.fillRect(-15, -3, 8, 6);
            ctx.fillStyle = '#795548';
            ctx.fillRect(-14, -2, 6, 4);

            // Guard
            ctx.fillStyle = '#FFD700';
            ctx.fillRect(-8, -4, 2, 8);

            ctx.restore();

            // Danger glow
            ctx.shadowColor = '#FF0000';
            ctx.shadowBlur = 8;
            ctx.strokeStyle = 'rgba(255,0,0,0.15)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(o.x, o.y, 18, 0, Math.PI * 2);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        function drawCoin(c) {
            c.bob += 0.05;
            const by = c.y + Math.sin(c.bob) * 4;

            // Glow
            ctx.fillStyle = 'rgba(255, 215, 0, 0.15)';
            ctx.beginPath();
            ctx.arc(c.x, by, c.size + 6, 0, Math.PI * 2);
            ctx.fill();

            // Star shape
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                const angle = (i * 4 * Math.PI / 5) - Math.PI / 2;
                const r = i === 0 ? c.size : c.size;
                const method = i === 0 ? 'moveTo' : 'lineTo';
                ctx[method](c.x + Math.cos(angle) * c.size, by + Math.sin(angle) * c.size);
                const innerAngle = angle + 2 * Math.PI / 10;
                ctx.lineTo(c.x + Math.cos(innerAngle) * c.size * 0.45, by + Math.sin(innerAngle) * c.size * 0.45);
            }
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#FFA000';
            ctx.lineWidth = 1;
            ctx.stroke();

            // +50 label
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 9px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('+50', c.x, by + c.size + 14);
        }

        function drawParticles() {
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1;
                p.life -= p.decay;
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function collides(a, b) {
            // a = player {x,y,w,h}, b = obstacle
            if (b.kind === 'knife') {
                const dx = (a.x + a.w / 2) - b.x;
                const dy = (a.y + a.h / 2) - b.y;
                return Math.sqrt(dx * dx + dy * dy) < 22;
            }
            return a.x < b.x + b.w && a.x + a.w > b.x &&
                   a.y < b.y + b.h && a.y + a.h > b.y;
        }

        function update() {
            if (!started || gameOver) return;
            frameCount++;

            // Difficulty increases over time
            difficulty = 1 + Math.floor(score / 200) * 0.3;

            // Player movement
            const speed = 4;
            if (keys['ArrowLeft']) { player.x -= speed; player.facing = -1; }
            if (keys['ArrowRight']) { player.x += speed; player.facing = 1; }
            if (keys['ArrowUp'] && player.onGround) {
                player.vy = -10;
                player.onGround = false;
            }
            // Allow fast fall
            if (keys['ArrowDown'] && !player.onGround) {
                player.vy += 0.8;
            }

            // Gravity
            player.vy += 0.5;
            player.y += player.vy;

            // Ground collision
            if (player.y >= groundY - player.h) {
                player.y = groundY - player.h;
                player.vy = 0;
                player.onGround = true;
            }

            // Keep in bounds (left/right)
            player.x = Math.max(0, Math.min(W - player.w, player.x));

            // Invincibility timer
            if (player.invincible > 0) player.invincible--;

            // Spawn enemies
            spawnTimer++;
            const spawnRate = Math.max(40, 100 - difficulty * 10);
            if (spawnTimer >= spawnRate) {
                spawnTimer = 0;
                if (Math.random() < 0.35) {
                    spawnKnife();
                } else {
                    spawnDino();
                }
            }

            // Spawn coins
            coinTimer++;
            if (coinTimer >= 90) {
                coinTimer = 0;
                spawnCoin();
            }

            // Update obstacles
            obstacles.forEach(o => {
                o.x += o.speed;
            });
            obstacles = obstacles.filter(o => o.x > -80 && o.x < W + 80);

            // Update coins
            coins.forEach(c => c.life--);
            coins = coins.filter(c => c.life > 0);

            // Check collisions with obstacles
            if (player.invincible <= 0) {
                for (let o of obstacles) {
                    if (collides(player, o)) {
                        player.lives--;
                        player.invincible = 90; // 1.5 seconds at 60fps
                        spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#FF5252', 15);

                        if (o.kind === 'knife') {
                            deathMessage = 'Ouch! Knife got Adler!';
                        } else {
                            deathMessage = 'The ' + o.name + ' got Adler!';
                        }

                        if (player.lives <= 0) {
                            gameOver = true;
                            document.getElementById('message').textContent = deathMessage + ' Restarting...';
                            setTimeout(() => { init(); startAutoGame(); }, 2000);
                            return;
                        }
                        break;
                    }
                }
            }

            // Check coin collection
            coins = coins.filter(c => {
                const dx = (player.x + player.w / 2) - c.x;
                const dy = (player.y + player.h / 2) - c.y;
                if (Math.sqrt(dx * dx + dy * dy) < c.size + 18) {
                    score += 50;
                    document.getElementById('score').textContent = score;
                    spawnParticles(c.x, c.y, '#FFD700', 12);
                    if (score > best) {
                        best = score;
                        localStorage.setItem('adlerDinoBest', best);
                        document.getElementById('best').textContent = best;
                    }
                    return false;
                }
                return true;
            });

            // Score for surviving
            if (frameCount % 30 === 0) {
                score += 10;
                document.getElementById('score').textContent = score;
                if (score > best) {
                    best = score;
                    localStorage.setItem('adlerDinoBest', best);
                    document.getElementById('best').textContent = best;
                }
            }
        }

        function drawStartScreen() {
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.fillRect(0, 0, W, H);

            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 48px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText("ADLER'S DINO DASH!", W / 2, H / 2 - 40);

            ctx.fillStyle = '#fff';
            ctx.font = '22px sans-serif';
            ctx.fillText('Press any arrow key to start!', W / 2, H / 2 + 10);

            ctx.fillStyle = '#aaa';
            ctx.font = '16px sans-serif';
            ctx.fillText('Arrow keys to move & jump. Collect stars. Dodge dinos & knives!', W / 2, H / 2 + 45);
        }

        function drawGameOverScreen() {
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, W, H);

            ctx.fillStyle = '#FF5252';
            ctx.font = 'bold 44px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(deathMessage, W / 2, H / 2 - 20);

            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 28px sans-serif';
            ctx.fillText('Score: ' + score, W / 2, H / 2 + 25);

            ctx.fillStyle = '#aaa';
            ctx.font = '20px sans-serif';
            ctx.fillText('Restarting...', W / 2, H / 2 + 60);
        }

        function draw() {
            drawBackground();

            // Draw coins
            coins.forEach(c => drawCoin(c));

            // Draw obstacles
            obstacles.forEach(o => {
                if (o.kind === 'knife') drawKnife(o);
                else drawDino(o);
            });

            // Draw player
            drawAdler();

            // Draw particles
            drawParticles();

            // Warning label in corner
            ctx.fillStyle = 'rgba(255,0,0,0.5)';
            ctx.font = 'bold 11px sans-serif';
            ctx.textAlign = 'right';
            const knifeCount = obstacles.filter(o => o.kind === 'knife').length;
            if (knifeCount > 0) {
                ctx.fillText('KNIVES: ' + knifeCount, W - 15, groundY + 25);
            }
            const dinoCount = obstacles.filter(o => o.kind === 'dino').length;
            if (dinoCount > 0) {
                ctx.fillStyle = 'rgba(76,175,80,0.7)';
                ctx.fillText('DINOS: ' + dinoCount, W - 15, groundY + 40);
            }

            if (!started && !gameOver) drawStartScreen();
            if (gameOver) drawGameOverScreen();

            update();
            requestAnimationFrame(draw);
        }

        function startAutoGame() {
            started = true;
            document.getElementById('message').textContent = '';
        }

        // Input
        document.addEventListener('keydown', (e) => {
            if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
                e.preventDefault();
                keys[e.key] = true;
                if (!started && !gameOver) {
                    startAutoGame();
                }
            }
        });
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        init();
        draw();
    </script>
</body>
</html>
