# .charts.yaml — declarative chart completeness expectations
# Consumed by /opt/site-deploy/helpers/visual-lint.js :: assertChartCategoriesComplete
# Wired into tests/abs-dashboard.spec.ts
#
# Motivated by the 2026-04-17 live-site "Hazard by LTV band" bug: chart rendered
# with only one of four LTV bands populated because an upstream unit-scaling bug
# collapsed the others to empty. Declaring expected_categories here would have
# failed the QA gate pre-promote.
#
# Stable chart IDs are emitted by methodology_tab.py::_plotly_div as
# `data-chart-id="..."`. Selector shape: `[data-chart-id="<id>"]`.
#
# All charts below are on the Methodology tab (Carvana section). Per-deal
# charts (pool balance, delinquency, charge-off, OC/reserve time series)
# are listed under `dynamic:` because their x-axis dates shift with each
# monthly servicer-cert release and can't be declared statically.

charts:

  # ---- Section 4: transition heatmaps + hazard panels ----
  "4a_heatmap_700-739_80-99pct_13-24":
    selector: '[data-chart-id="4a_heatmap_700-739_80-99pct_13-24"]'
    description: "Transition heatmap — Prime-grade buyer rep cell (FICO 700-739, LTV 80-99%, age 13-24mo)"
    expected_categories: ["Current", "1pmt", "2pmt", "3pmt", "4pmt", "5+pmt", "Default", "Payoff"]
    expected_series_min: 1
    data_points_per_category_min: 1
    require_title: true
    require_x_axis_label: true
    require_y_axis_label: true

  "4a_heatmap_620-659_100-119pct_13-24":
    selector: '[data-chart-id="4a_heatmap_620-659_100-119pct_13-24"]'
    description: "Transition heatmap — Near-prime underwater rep cell (FICO 620-659, LTV 100-119%, age 13-24mo)"
    expected_categories: ["Current", "1pmt", "2pmt", "3pmt", "4pmt", "5+pmt", "Default", "Payoff"]
    expected_series_min: 1
    data_points_per_category_min: 1
    require_title: true
    require_x_axis_label: true
    require_y_axis_label: true

  "4a_heatmap_580-619_120pluspct_13-24":
    selector: '[data-chart-id="4a_heatmap_580-619_120pluspct_13-24"]'
    description: "Transition heatmap — Subprime deep underwater rep cell (FICO 580-619, LTV 120%+, age 13-24mo)"
    expected_categories: ["Current", "1pmt", "2pmt", "3pmt", "4pmt", "5+pmt", "Default", "Payoff"]
    expected_series_min: 1
    data_points_per_category_min: 1
    require_title: true
    require_x_axis_label: true
    require_y_axis_label: true

  "4a_heatmap_740plus_lt80pct_13-24":
    selector: '[data-chart-id="4a_heatmap_740plus_lt80pct_13-24"]'
    description: "Transition heatmap — Super-prime equity-buyer rep cell (FICO 740+, LTV <80%, age 13-24mo)"
    expected_categories: ["Current", "1pmt", "2pmt", "3pmt", "4pmt", "5+pmt", "Default", "Payoff"]
    expected_series_min: 1
    data_points_per_category_min: 1
    require_title: true
    require_x_axis_label: true
    require_y_axis_label: true

  "4b_hazard_by_age_prime":
    selector: '[data-chart-id="4b_hazard_by_age_prime"]'
    description: "Default hazard by loan age — Prime tiers (CarMax + Carvana)"
    expected_categories: ["0-6", "7-12", "13-24", "25-36", "37+"]
    expected_series_min: 2          # CarMax Prime + Carvana Prime
    data_points_per_category_min: 1
    require_title: true
