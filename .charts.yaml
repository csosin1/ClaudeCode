    require_y_axis_label: true

  "4b_hazard_by_age_nonprime":
    selector: '[data-chart-id="4b_hazard_by_age_nonprime"]'
    description: "Default hazard by loan age — Carvana Non-Prime panel"
    expected_categories: ["0-6", "7-12", "13-24", "25-36", "37+"]
    expected_series_min: 1
    data_points_per_category_min: 1
