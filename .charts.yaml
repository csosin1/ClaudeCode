  # ---- Section 7d: vintage stability scatter ----
  "7d_issuer_coef_by_vintage":
    selector: '[data-chart-id="7d_issuer_coef_by_vintage"]'
    description: "Issuer-CarMax log-odds coefficient by vintage year (with 95% CI error bars)"
    # Vintages are known: fit on 2017-2025 span per spec comments in methodology_tab.py
    expected_categories: []         # numeric axis, category check skipped
    expected_series_min: 1
    data_points_per_category_min: 1
    require_title: false
    require_x_axis_label: true
    require_y_axis_label: true

  # ---- Section 9: cost of funds (dates-on-x, series-on-legend) ----
  "9a_note_wac_vs_2y_tsy":
    selector: '[data-chart-id="9a_note_wac_vs_2y_tsy"]'
    description: "Weighted-avg note coupon & 2Y Treasury yield over time, by issuer/tier"
    expected_categories: []         # x-axis is deal-cutoff dates; varies monthly
    expected_series_min: 2          # at least Carvana + CarMax + Treasury overlay
    data_points_per_category_min: 1
    require_title: false
    require_x_axis_label: true
    require_y_axis_label: true

  "9b_credit_spread":
    selector: '[data-chart-id="9b_credit_spread"]'
    description: "Credit spread (note WAC minus 2Y Treasury) over time, by issuer/tier"
    expected_categories: []
    expected_series_min: 2
    data_points_per_category_min: 1
    require_title: false
    require_x_axis_label: true
    require_y_axis_label: true


# -----------------------------------------------------------------------------
# Charts intentionally NOT declared (would be too fragile as static declarations)
# -----------------------------------------------------------------------------
dynamic:
  "per_deal_pool_balance":
    reason: >-
      Rendered once per deal (~70+ deals) in the per-deal tab panels. X-axis is
      the monthly servicer-cert dates — the category set grows by one every
      month when a new 10-D arrives. Declaring specific dates would create
      monthly churn with no corresponding QA value.
  "per_deal_delinquency_rate":
    reason: >-
      Same reason as pool_balance — per-deal time series of 30/60/90+ DQ
      percentages with dates on x-axis that shift each month.
  "per_deal_charge_off_curve":
    reason: >-
      Per-deal cumulative net loss over time. Values mutate every month;
      declaring specific categories (dates) is noise.
  "per_deal_oc_and_reserve":
    reason: >-
      Per-deal overcollateralization & reserve-account time series. Series
      names stable, but x-axis dates shift monthly.
  "per_deal_projected_loss":
    reason: >-
      Markov-model lifetime-loss projection fan chart. Number of projection
      months varies by deal age. The inner assertNoEmptyCharts rule still
      ensures these render with data; declaring specific categories would
      re-implement the model's projection window in YAML.
  "landing_page_cal_factor_over_time":
    reason: >-
      Rolling 12-month window on the landing page — category set slides by
      one month every ingest. Captured by the generic assertNoEmptyCharts /
      assertChartHasTitle instead.
  "landing_page_monthly_loss_pace":
    reason: >-
      Same rolling-window reason as cal_factor_over_time.
  "sec7c_confusion_matrices_and_roc":
    reason: >-
      Confusion-matrix + ROC tables use raw HTML rather than Plotly, so they
      don't show up under .js-plotly-plot at all. Covered by the
      assertNoContentPlaceholders / assertNoRawHtmlEntities checks on the
      surrounding text.
