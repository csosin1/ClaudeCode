name: Check Dashboard

on:
  push:
    branches: [claude/carvana-loan-dashboard-4QMPM]
    paths: ['.github/workflows/check-dashboard.yml']

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/carvana-loan-dashboard-4QMPM

      - name: Check
        run: |
          curl -s -o d.html "http://159.223.127.125/CarvanaLoanDashBoard/preview/?v=$(date +%s)"
          python3 << 'PYEOF'
          import re
          with open("d.html") as f: html=f.read()
          with open("deploy/dashboard_check.txt","w") as o:
              o.write(f"Size: {len(html)}\n\n")
              tabs = re.findall(r'onclick="showTab\(\'2020_P1_([^\']+)\'', html)
              o.write(f"2020-P1 tabs: {tabs}\n")
              o.write(f"'Documents' in HTML: {'Documents' in html}\n")
              o.write(f"'Servicer Certificates' in HTML: {'Servicer Certificates' in html}\n")
              o.write(f"'Prospectus' in HTML: {'Prospectus' in html}\n")
              doc_links = re.findall(r'href="docs/[^"]*"', html)
              o.write(f"Local doc links: {len(doc_links)}\n")
              sec_links = re.findall(r'SEC.Filing|EDGAR', html)
              o.write(f"SEC/EDGAR link count: {len(sec_links)}\n")
              # Show first 500 chars of Documents section
              doc_match = re.search(r'id="2020_P1_Documents".*?(?=<div id="|$)', html, re.DOTALL)
              if doc_match:
                  o.write(f"\n2020-P1 Documents section (first 500 chars):\n{doc_match.group(0)[:500]}\n")
              else:
                  o.write(f"\nNo Documents section found for 2020-P1\n")
          PYEOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/dashboard_check.txt
          git diff --cached --quiet || (git commit -m "QA check - docs tab v2" && git push)
