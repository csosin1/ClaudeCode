name: Check Dashboard

on:
  push:
    branches: [claude/carvana-loan-dashboard-4QMPM]
    paths: ['.github/workflows/check-dashboard.yml']

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/carvana-loan-dashboard-4QMPM

      - name: Check
        run: |
          curl -s -o d.html "http://159.223.127.125/CarvanaLoanDashBoard/preview/?v=$(date +%s)"
          python3 << 'PYEOF'
          import re
          with open("d.html") as f: html=f.read()
          with open("deploy/dashboard_check.txt","w") as o:
              o.write(f"Size: {len(html)}\n\n")
              for d in re.findall(r'<!-- DEBUG_SUMMARY.*?-->',html): o.write(f"{d}\n")
              o.write(f"\nCoD charts: {html.count('Avg Trust Cost of Debt')}\n\n")
              for d in re.findall(r'<!-- DEBUG \[.*?-->',html): o.write(f"{d}\n")
              for label,pat in [("PRIME","Prime Deals"),("NON-PRIME","Non-Prime Deals")]:
                  m=re.search(pat+r' — Summary.*?</table>',html,re.DOTALL)
                  if m:
                      cells=re.findall(r'<td>(.*?)</td>',m.group(0))
                      o.write(f"\n{label} TABLE:\n")
                      for i in range(0,len(cells),10): o.write(f"  {'|'.join(cells[i:i+10])}\n")
          PYEOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/dashboard_check.txt
          git diff --cached --quiet || (git commit -m "QA check v3" && git push)
