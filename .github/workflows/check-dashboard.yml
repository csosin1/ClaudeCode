name: Check Dashboard

on:
  push:
    branches: [claude/carvana-loan-dashboard-4QMPM]
    paths: ['.github/workflows/check-dashboard.yml']

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/carvana-loan-dashboard-4QMPM

      - name: Check
        run: |
          curl -s -o d.html "http://159.223.127.125/CarvanaLoanDashBoard/preview/?v=$(date +%s)"
          python3 << 'PYEOF'
          import re
          with open("d.html") as f: html=f.read()
          with open("deploy/dashboard_check.txt","w") as o:
              o.write(f"Size: {len(html)}\n\n")
              # Check what tabs exist for 2020-P1
              tabs_match = re.search(r'id="2020_P1_Documents"', html)
              o.write(f"Documents tab exists for 2020-P1: {bool(tabs_match)}\n")
              # List all tab buttons for 2020-P1
              buttons = re.findall(r'onclick="showTab\(\'2020_P1_([^\']+)\'', html)
              o.write(f"2020-P1 tabs: {buttons}\n")
              # Check for docs directory links
              doc_links = re.findall(r'href="docs/[^"]*"', html)
              o.write(f"Doc links found: {len(doc_links)}\n")
              for dl in doc_links[:10]:
                  o.write(f"  {dl}\n")
              # Check for SEC filing links
              sec_links = re.findall(r'href="https://www\.sec\.gov[^"]*"', html)
              o.write(f"SEC links: {len(sec_links)}\n")
              # Check for "Servicer Certificates" text
              o.write(f"'Servicer Certificates' in page: {'Servicer Certificates' in html}\n")
              o.write(f"'Documents' in page: {'Documents' in html}\n")
              o.write(f"'Prospectus' in page: {'Prospectus' in html}\n")
              # Check if docs/ PDFs are accessible
              import subprocess
              r = subprocess.run(["curl", "-s", "-o", "/dev/null", "-w", "%{http_code}",
                  "http://159.223.127.125/CarvanaLoanDashBoard/preview/docs/2020-P1/"], capture_output=True, text=True)
              o.write(f"\nDocs dir HTTP status: {r.stdout}\n")
          PYEOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/dashboard_check.txt
          git diff --cached --quiet || (git commit -m "QA check - documents tab" && git push)
