name: Server Check

# Runs every 10 minutes and on-demand via workflow_dispatch.
# Writes results to issue #4 as a comment (replaces old pinned comment).
# Also triggered by issue comments starting with /check.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      target:
        description: '"all", "car-offers", "gym-intelligence", or a URL path'
        required: false
        default: 'all'
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    # Skip issue_comment events that don't start with /check
    if: >-
      github.event_name != 'issue_comment' ||
      startsWith(github.event.comment.body, '/check')

    steps:
      - name: Run server checks
        id: check
        run: |
          BASE="http://159.223.127.125"
          REPORT="/tmp/server-check-report.md"

          # Parse target
          TARGET="all"
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            RAW=$(cat <<'BODYEOF'
          ${{ github.event.comment.body }}
          BODYEOF
            )
            TARGET=$(echo "$RAW" | head -1 | sed 's|^/check||' | xargs)
            [ -z "$TARGET" ] && TARGET="all"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ github.event.inputs.target }}"
            [ -z "$TARGET" ] && TARGET="all"
          fi

          echo "## 🔍 Server Check: \`$TARGET\`" > "$REPORT"
          echo "" >> "$REPORT"

          check_url() {
            local label="$1" url="$2"
            STATUS=$(curl -sf -o /dev/null -w '%{http_code}' --max-time 10 "$url" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "- ✅ **$label**: $STATUS" >> "$REPORT"
            else
              echo "- ❌ **$label**: $STATUS" >> "$REPORT"
            fi
          }

          fetch_json() {
            local label="$1" url="$2"
            BODY=$(curl -sf --max-time 10 "$url" 2>/dev/null || echo '{"error":"request failed or timed out"}')
            PRETTY=$(echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY")
            echo "" >> "$REPORT"
            echo "<details><summary><b>$label</b></summary>" >> "$REPORT"
            echo "" >> "$REPORT"
            echo '```json' >> "$REPORT"
            echo "$PRETTY" >> "$REPORT"
            echo '```' >> "$REPORT"
            echo "</details>" >> "$REPORT"
          }

          # Custom URL path
          if echo "$TARGET" | grep -q '^/'; then
            check_url "$TARGET" "$BASE$TARGET"
            BODY=$(curl -sf --max-time 10 "$BASE$TARGET" 2>/dev/null || echo "(no response)")
            echo "" >> "$REPORT"
            echo '```' >> "$REPORT"
            echo "$BODY" >> "$REPORT"
            echo '```' >> "$REPORT"
          else
            # Core status
            fetch_json "status.json" "$BASE/status.json"
            fetch_json "debug.json" "$BASE/debug.json"

            # Car-offers
            if [ "$TARGET" = "all" ] || [ "$TARGET" = "car-offers" ]; then
              echo "" >> "$REPORT"
              echo "### Car Offers" >> "$REPORT"
              check_url "Main page" "$BASE/car-offers/"
              check_url "Dashboard" "$BASE/car-offers/dashboard"
              fetch_json "/api/status" "$BASE/car-offers/api/status"
            fi

            # Gym Intelligence
            if [ "$TARGET" = "all" ] || [ "$TARGET" = "gym-intelligence" ]; then
              echo "" >> "$REPORT"
              echo "### Gym Intelligence" >> "$REPORT"
              check_url "Main page" "$BASE/gym-intelligence/"
              for ep in /gym-intelligence/api/country-counts /gym-db-status.json; do
                RESP=$(curl -sf --max-time 10 "$BASE$ep" 2>/dev/null)
                if [ -n "$RESP" ]; then
                  fetch_json "$ep" "$BASE$ep"
                fi
              done
            fi
          fi

          echo "" >> "$REPORT"
          echo "---" >> "$REPORT"
          echo "_$(date -u +%Y-%m-%dT%H:%M:%SZ) · trigger: ${{ github.event_name }}_" >> "$REPORT"

          cat "$REPORT"
          cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"

      - name: Post results to issue #4
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = 'Server check completed but report not available. See workflow run.';
            try {
              body = fs.readFileSync('/tmp/server-check-report.md', 'utf8');
            } catch (e) {
              console.log('Report file not found:', e.message);
            }

            // For scheduled runs: update the pinned status comment (last bot comment)
            // For issue_comment: reply on the same issue
            const issueNumber = 4;

            if ('${{ github.event_name }}' === 'schedule') {
              // Find and update existing bot comment, or create new one
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                per_page: 100
              });
              const botComment = comments.data
                .filter(c => c.user.login === 'github-actions[bot]')
                .pop();
              if (botComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: body
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: body
                });
              }
            } else {
              // For dispatch and issue_comment: always create new comment
              const targetIssue = context.issue?.number || issueNumber;
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: targetIssue,
                body: body
              });
            }
