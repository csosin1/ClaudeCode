name: Server Check

# Project chats post "/check" on issue #4 to trigger this.
# Results are posted back as an issue comment.
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'What to check: "all", "car-offers", "gym-intelligence", or a URL path like "/car-offers/api/status"'
        required: false
        default: 'all'
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    # Only run if: workflow_dispatch OR issue comment starting with /check
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/check'))

    steps:
      - name: Run server checks
        id: check
        run: |
          BASE="http://159.223.127.125"
          REPORT=$(mktemp)

          # Parse target
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            # Extract target: "/check car-offers" → "car-offers", "/check" → "all"
            RAW_BODY=$(cat <<'BODY_EOF'
          ${{ github.event.comment.body }}
          BODY_EOF
            )
            TARGET=$(echo "$RAW_BODY" | head -1 | sed 's|^/check||' | xargs)
            [ -z "$TARGET" ] && TARGET="all"
          else
            TARGET="${{ github.event.inputs.target }}"
            [ -z "$TARGET" ] && TARGET="all"
          fi

          echo "## Server Check: \`$TARGET\`" >> "$REPORT"
          echo "" >> "$REPORT"

          check_url() {
            local label="$1" url="$2"
            STATUS=$(curl -sf -o /dev/null -w '%{http_code}' --max-time 10 "$url" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "- ✅ **$label**: $STATUS" >> "$REPORT"
            else
              echo "- ❌ **$label**: $STATUS" >> "$REPORT"
            fi
          }

          fetch_json() {
            local label="$1" url="$2"
            BODY=$(curl -sf --max-time 10 "$url" 2>/dev/null || echo '{"error":"request failed"}')
            PRETTY=$(echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY")
            echo "" >> "$REPORT"
            echo "### $label" >> "$REPORT"
            echo '```json' >> "$REPORT"
            echo "$PRETTY" >> "$REPORT"
            echo '```' >> "$REPORT"
          }

          # Custom URL path (e.g. /check /car-offers/api/status)
          if echo "$TARGET" | grep -q '^/'; then
            check_url "$TARGET" "$BASE$TARGET"
            echo "" >> "$REPORT"
            echo '```' >> "$REPORT"
            curl -sf --max-time 10 "$BASE$TARGET" >> "$REPORT" 2>/dev/null || echo "(no response)" >> "$REPORT"
            echo "" >> "$REPORT"
            echo '```' >> "$REPORT"
          else
            # Always show status.json
            fetch_json "status.json" "$BASE/status.json"
            fetch_json "debug.json" "$BASE/debug.json"

            # Car-offers
            if [ "$TARGET" = "all" ] || [ "$TARGET" = "car-offers" ]; then
              echo "" >> "$REPORT"
              echo "### Car Offers" >> "$REPORT"
              check_url "Main page" "$BASE/car-offers/"
              check_url "Dashboard" "$BASE/car-offers/dashboard"
              fetch_json "/api/status" "$BASE/car-offers/api/status"
            fi

            # Gym Intelligence
            if [ "$TARGET" = "all" ] || [ "$TARGET" = "gym-intelligence" ]; then
              echo "" >> "$REPORT"
              echo "### Gym Intelligence" >> "$REPORT"
              check_url "Main page" "$BASE/gym-intelligence/"
              # Try project-specific endpoints
              for ep in /gym-intelligence/api/country-counts /gym-db-status.json; do
                RESP=$(curl -sf --max-time 10 "$BASE$ep" 2>/dev/null)
                if [ -n "$RESP" ]; then
                  fetch_json "$ep" "$BASE$ep"
                fi
              done
            fi
          fi

          echo "" >> "$REPORT"
          echo "---" >> "$REPORT"
          echo "_Completed $(date -u +%Y-%m-%dT%H:%M:%SZ)_" >> "$REPORT"

          # Output for next step
          cat "$REPORT"
          cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"

          # Save report path for comment posting
          echo "report=$REPORT" >> "$GITHUB_OUTPUT"

      - name: Post results to issue
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = '${{ steps.check.outputs.report }}';
            let body = 'Server check completed. See workflow run for details.';
            try {
              body = fs.readFileSync(reportPath, 'utf8');
            } catch (e) {
              console.log('Could not read report file:', e.message);
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
