name: Fetch Servicer Cert

on:
  push:
    branches: [claude/carvana-loan-dashboard-4QMPM]
    paths: ['.github/workflows/fetch-cert.yml']

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Download and dump cert content
        run: |
          curl -s -A "Clifford Sosin clifford.sosin@casinvestmentpartners.com" \
            -o cert.htm \
            "https://www.sec.gov/Archives/edgar/data/1801738/000180173825000053/crvna2020-p1servicerrepo.htm"
          echo "Downloaded $(wc -c < cert.htm) bytes"
          echo ""
          echo "=== EXTRACTED TEXT (numbered fields area) ==="
          python3 -c "
          from html.parser import HTMLParser
          import re
          class T(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.t = []
              def handle_data(self, d):
                  self.t.append(d)
          with open('cert.htm') as f:
              html = f.read()
          p = T()
          p.feed(html)
          text = '\n'.join(p.t)
          # Find numbered fields - print fields 10-80
          for m in re.finditer(r'(?:^|\n)\s*(\d{1,3})\.\s+(.+?)(?=\n\s*\d{1,3}\.\s|\Z)', text, re.DOTALL):
              num = int(m.group(1))
              if 10 <= num <= 80:
                  content = m.group(2).strip()[:200]
                  print(f'FIELD {num:3d}: {content}')
          "
