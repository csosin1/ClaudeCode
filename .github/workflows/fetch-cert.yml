name: Fetch Servicer Cert

on:
  push:
    branches: [claude/carvana-loan-dashboard-4QMPM]
    paths: ['.github/workflows/fetch-cert.yml']

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/carvana-loan-dashboard-4QMPM

      - name: Download and extract cert
        run: |
          curl -s -A "Clifford Sosin clifford.sosin@casinvestmentpartners.com" \
            -o cert.htm \
            "https://www.sec.gov/Archives/edgar/data/1801738/000180173825000053/crvna2020-p1servicerrepo.htm"
          echo "Downloaded $(wc -c < cert.htm) bytes"

          python3 << 'PYEOF'
          from html.parser import HTMLParser

          class T(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.t = []
              def handle_data(self, d):
                  d = d.strip()
                  if d:
                      self.t.append(d)

          with open("cert.htm") as f:
              html = f.read()
          p = T()
          p.feed(html)

          with open("deploy/certs_fields.txt", "w") as out:
              out.write(f"Raw HTML size: {len(html)} bytes\n")
              out.write(f"Text segments: {len(p.t)}\n\n")
              # Write all text segments (the full cert content)
              for i, seg in enumerate(p.t):
                  out.write(f"{seg}\n")
          print(f"Wrote {len(p.t)} text segments")
          PYEOF

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/certs_fields.txt
          git diff --cached --quiet && echo "No changes" || (git commit -m "Dump raw cert text" && git push)
