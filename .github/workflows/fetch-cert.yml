name: Fetch Servicer Cert

on:
  push:
    branches: [claude/carvana-loan-dashboard-4QMPM]
    paths: ['.github/workflows/fetch-cert.yml']

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/carvana-loan-dashboard-4QMPM

      - name: Download 2022-P1 cert
        run: |
          UA="Clifford Sosin clifford.sosin@casinvestmentpartners.com"
          # 2022-P1 CIK=0001903763
          CIK="1903763"

          # Get submissions
          curl -s -A "$UA" "https://data.sec.gov/submissions/CIK0001903763.json" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          r=d.get('filings',{}).get('recent',{})
          forms=r.get('form',[])
          accs=r.get('accessionNumber',[])
          for i,f in enumerate(forms):
              if f=='10-D':
                  acc=accs[i].replace('-','')
                  print(f'{acc}')
                  break
          " > acc.txt

          ACC=$(cat acc.txt)
          echo "Latest 10-D accession: $ACC"

          # Get filing index
          sleep 0.2
          curl -s -A "$UA" "https://www.sec.gov/Archives/edgar/data/$CIK/$ACC/index.json" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          items=d.get('directory',{}).get('item',[])
          for item in items:
              n=item.get('name','').lower()
              if 'servicer' in n or 'ex99' in n or 'ex-99' in n:
                  print(item['name'])
                  break
          " > cert_name.txt

          CERT=$(cat cert_name.txt)
          echo "Cert exhibit: $CERT"

          if [ -n "$CERT" ]; then
            sleep 0.2
            curl -s -A "$UA" -o cert_2022p1.htm \
              "https://www.sec.gov/Archives/edgar/data/$CIK/$ACC/$CERT"
            echo "Downloaded $(wc -c < cert_2022p1.htm) bytes"
          fi

          # Extract text
          python3 << 'PYEOF'
          from html.parser import HTMLParser
          import os

          class T(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.t = []
              def handle_data(self, d):
                  d = d.strip()
                  if d:
                      self.t.append(d)

          if os.path.exists("cert_2022p1.htm"):
              with open("cert_2022p1.htm") as f:
                  html = f.read()
              p = T()
              p.feed(html)
              with open("deploy/cert_2022p1_text.txt", "w") as out:
                  out.write(f"Size: {len(html)} bytes\n\n")
                  for seg in p.t:
                      out.write(f"{seg}\n")
              print(f"Extracted {len(p.t)} text segments")
          else:
              print("No cert downloaded")
          PYEOF

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/cert_2022p1_text.txt 2>/dev/null || true
          git diff --cached --quiet && echo "No changes" || (git commit -m "Add 2022-P1 cert text" && git push)
