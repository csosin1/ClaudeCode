name: QA Smoke Tests

on:
  push:
    branches: [main]

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache Playwright
        id: cache-pw
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
            node_modules
          key: playwright-${{ runner.os }}-${{ hashFiles('playwright.config.ts') }}

      - name: Install Playwright
        if: steps.cache-pw.outputs.cache-hit != 'true'
        run: |
          npm init -y
          npm install @playwright/test
          npx playwright install chromium
          npx playwright install-deps chromium

      - name: Install Playwright deps (always needed)
        if: steps.cache-pw.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Wait for deploy
        run: sleep 15

      - name: Run QA tests
        run: npx playwright test --config=playwright.config.ts
        env:
          BASE_URL: http://159.223.127.125

      - name: Server diagnostics
        if: always()
        run: |
          echo "### Server Diagnostics" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          curl -sf http://159.223.127.125/status.json 2>/dev/null | python3 -m json.tool >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo '{"error":"status.json not available"}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### debug.json" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          curl -sf http://159.223.127.125/debug.json 2>/dev/null | python3 -m json.tool >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo '{"error":"debug.json not available"}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Post diagnostics to issue #4
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const BASE = 'http://159.223.127.125';
            const endpoints = [
              { label: 'Landing', url: `${BASE}/` },
              { label: 'Car Offers', url: `${BASE}/car-offers/` },
              { label: 'Gym Intelligence', url: `${BASE}/gym-intelligence/` },
              { label: 'Games', url: `${BASE}/games/` },
              { label: 'Carvana Hub', url: `${BASE}/carvana/` },
              { label: 'Carvana Dashboard', url: `${BASE}/CarvanaLoanDashBoard/` },
            ];

            // Check each endpoint
            const results = [];
            for (const ep of endpoints) {
              try {
                const resp = await fetch(ep.url, { signal: AbortSignal.timeout(10000) });
                results.push(`- ${resp.ok ? '✅' : '❌'} **${ep.label}**: ${resp.status}`);
              } catch (e) {
                results.push(`- ❌ **${ep.label}**: timeout/error`);
              }
            }

            // Fetch status.json
            let statusJson = '{"error":"not available"}';
            try {
              const resp = await fetch(`${BASE}/status.json`, { signal: AbortSignal.timeout(10000) });
              if (resp.ok) statusJson = JSON.stringify(JSON.parse(await resp.text()), null, 2);
            } catch (e) {}

            // Fetch debug.json
            let debugJson = '{"error":"not available"}';
            try {
              const resp = await fetch(`${BASE}/debug.json`, { signal: AbortSignal.timeout(10000) });
              if (resp.ok) debugJson = JSON.stringify(JSON.parse(await resp.text()), null, 2);
            } catch (e) {}

            // Build report
            const sha = '${{ github.sha }}'.slice(0, 7);
            const body = [
              `## 🔍 Post-Deploy Check — \`${sha}\``,
              '',
              results.join('\n'),
              '',
              '<details><summary><b>status.json</b></summary>',
              '',
              '```json',
              statusJson,
              '```',
              '</details>',
              '',
              '<details><summary><b>debug.json</b></summary>',
              '',
              '```json',
              debugJson,
              '```',
              '</details>',
              '',
              '---',
              `_${new Date().toISOString()} · push · commit ${sha}_`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 4,
              body: body
            });

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-screenshots
          path: test-results/
          retention-days: 7
