name: QA Smoke Tests

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright
        run: |
          npm init -y
          npm install @playwright/test
          npx playwright install chromium
          npx playwright install-deps chromium

      - name: Wait for deploy
        run: sleep 15

      - name: Run QA tests
        run: npx playwright test --config=playwright.config.ts
        env:
          BASE_URL: http://159.223.127.125

      - name: Server diagnostics (on failure)
        if: failure()
        run: |
          echo "### Server Diagnostics" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          curl -sf http://159.223.127.125/debug.json 2>/dev/null || echo '{"error":"debug.json not available"}'
          curl -sf http://159.223.127.125/debug.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo '{"error":"debug.json not available"}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Save Carvana result to repo
        if: always()
        run: |
          mkdir -p results
          curl -sf http://159.223.127.125/carvana-result.json > results/carvana-latest.json 2>/dev/null || echo '{"status":"not ready"}' > results/carvana-latest.json
          curl -sf http://159.223.127.125/debug.json > results/debug-latest.json 2>/dev/null || echo '{}' > results/debug-latest.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --cached --quiet || git commit -m "QA results: run #${{ github.run_number }} [skip ci]" && git push || true

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-screenshots
          path: test-results/
          retention-days: 7
